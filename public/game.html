    { top:'#152e38', bot:'#061318', rim:'rgba(0,180,155,0.28)', hi:'rgba(0,220,190,0.22)', cr:'rgba(0,0,0,0.28)', moss:['rgba(0,90,65,0.55)','rgba(0,60,45,0.35)'] },
    { top:'#162a18', bot:'#070f08', rim:'rgba(40,185,65,0.30)', hi:'rgba(55,215,85,0.24)', cr:'rgba(0,0,0,0.30)', moss:['rgba(20,95,18,0.58)','rgba(12,62,10,0.38)'] },
    { top:'#10091a', bot:'#050309', rim:'rgba(75,45,125,0.25)', hi:'rgba(95,60,155,0.20)', cr:'rgba(0,0,0,0.38)', moss:['rgba(45,20,75,0.55)','rgba(28,12,50,0.35)'] },
    { top:'#0c1422', bot:'#030710', rim:'rgba(130,185,255,0.32)', hi:'rgba(175,215,255,0.28)', cr:'rgba(0,0,0,0.40)', moss:['rgba(65,105,195,0.48)','rgba(40,70,155,0.32)'] },
    { top:'#1c0608', bot:'#0a0203', rim:'rgba(220,60,30,0.38)', hi:'rgba(255,90,40,0.30)', cr:'rgba(0,0,0,0.45)', moss:['rgba(180,42,15,0.58)','rgba(120,25,8,0.40)'] },
    { top:'#120418', bot:'#06010a', rim:'rgba(160,40,180,0.35)', hi:'rgba(200,60,220,0.28)', cr:'rgba(0,0,0,0.42)', moss:['rgba(100,20,120,0.55)','rgba(60,10,80,0.38)'] },
    { top:'#180408', bot:'#0a0104', rim:'rgba(180,20,30,0.35)', hi:'rgba(220,40,40,0.28)', cr:'rgba(0,0,0,0.48)', moss:['rgba(120,15,20,0.55)','rgba(80,8,12,0.38)'] },
    { top:'#0a0614', bot:'#04020a', rim:'rgba(180,40,255,0.35)', hi:'rgba(220,80,255,0.28)', cr:'rgba(0,0,0,0.45)', moss:['rgba(100,20,160,0.55)','rgba(60,10,100,0.38)'] },
    { top:'#0a1208', bot:'#030804', rim:'rgba(40,180,60,0.30)', hi:'rgba(60,220,80,0.22)', cr:'rgba(0,0,0,0.50)', moss:['rgba(20,80,15,0.60)','rgba(10,50,8,0.40)'] },
    { top:'#1a1208', bot:'#0a0804', rim:'rgba(255,200,60,0.35)', hi:'rgba(255,220,100,0.28)', cr:'rgba(0,0,0,0.35)', moss:['rgba(180,130,30,0.55)','rgba(120,85,15,0.38)'] }
  ];

  for (const p of platforms) {
    const sx = p.x - camX;
    if (sx > W+60 || sx+p.w < -60) continue;
    const pp = p.x < 5000 ? 1 : p.x < 10000 ? 2 : p.x < 15000 ? 3 : p.x < 23000 ? 4 : p.x < 33000 ? 5 : p.x < 42000 ? 6 : p.x < 52000 ? 7 : p.x < 62000 ? 8 : p.x < 71540 ? 9 : 10;
    const S = STONE[pp-1];

    ctx.save();

    // ── Corpo de pedra com gradiente ──────────────────────────
    const g = ctx.createLinearGradient(sx, p.y, sx, p.y + p.h);
    g.addColorStop(0, S.top);
    g.addColorStop(0.35, S.top);
    g.addColorStop(1, S.bot);
    ctx.fillStyle = g;
    ctx.fillRect(sx, p.y, p.w, p.h);

    // ── Brilho no topo (luz vinda de cima) ────────────────────
    const hi = ctx.createLinearGradient(sx, p.y, sx, p.y + 5);
    hi.addColorStop(0, S.hi);
    hi.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = hi;
    ctx.fillRect(sx, p.y, p.w, 5);

    // ── Borda colorida sutil ──────────────────────────────────
    ctx.strokeStyle = S.rim;
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + 0.5, p.y + 0.5, p.w - 1, p.h - 1);

    // ── Rachaduras deterministas (sem Math.random — baseado em p.x) ──
    let seed = (p.x * 7 + 13) | 0;
    const rng = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967295; };
    ctx.strokeStyle = S.cr;
    ctx.lineWidth = 0.6;
    const nCracks = Math.floor(p.w / 32);
    for (let i = 0; i < nCracks; i++) {
      const cx2 = sx + 8 + rng() * (p.w - 16);
      const t = p.y + rng() * (p.h * 0.35);
      const b = t + 4 + rng() * (p.h * 0.5);
      const mx = cx2 + (rng() - 0.5) * 5;
      ctx.beginPath();
      ctx.moveTo(cx2 + (rng()-0.5)*3, t);
      ctx.quadraticCurveTo(mx, (t+b)*0.5, cx2 + (rng()-0.5)*3, b);
      ctx.stroke();
    }

    // ── Superfície musgosa no topo das plataformas flutuantes ──
    if (p.type === 'plat') {
      ctx.fillStyle = S.moss[0];
      ctx.fillRect(sx, p.y, p.w, 3);
      ctx.fillStyle = S.moss[1];
      ctx.fillRect(sx + 3, p.y + 1, p.w - 6, 1);
      // Pequenas saliências orgânicas na borda superior
      ctx.fillStyle = S.moss[0];
      for (let ix = 4; ix < p.w - 4; ix += Math.floor(9 + rng() * 8)) {
        const bh = 1 + Math.floor(rng() * 3);
        ctx.fillRect(sx + ix, p.y - bh, 3 + Math.floor(rng()*3), bh);
      }
    }

    // ── Halo pulsante para plataformas móveis (Fase 5) ──────────
    if (p.mvx !== undefined) {
      const mgr = ctx.createRadialGradient(sx+p.w/2, p.y+p.h/2, 0, sx+p.w/2, p.y+p.h/2, p.w*0.9+12);
      const gA = 0.18 + Math.sin(tick * 0.14 + (p._bx||p.x) * 0.01) * 0.09;
      mgr.addColorStop(0, `rgba(255,85,20,${gA*2.2})`);
      mgr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save(); ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = mgr;
      ctx.fillRect(sx - 10, p.y - 10, p.w + 20, p.h + 20);
      ctx.restore();
    }

    ctx.restore();
  }
}

function drawPlayer() {
  const px = player.x - camX;
  const py = player.y;
  const f  = player.facing;
  player.wingFrame = (player.wingFrame || 0) + 1;
  const gInt = 0.7 + Math.sin(player.flickerPhase * 0.9) * 0.3;

  // 0 = frente, 1 = correndo — capa voa para trás
  const isMoving = keys['ArrowLeft'] || keys['ArrowRight'] || keys['KeyA'] || keys['KeyD'];
  const targetTurn = isMoving ? 1.0 : 0.0;
  if (player.turnProgress === undefined) player.turnProgress = 0.0;
  player.turnProgress += (targetTurn - player.turnProgress) * 0.10;
  const tp = player.turnProgress;
  const L = (a, b) => a * (1 - tp) + b * tp;

  // Flutter da capa
  const Tf = player.wingFrame * 0.06;
  const flt = Math.sin(Tf * 2.2) * 3.5 + Math.sin(Tf * 3.5 + 0.8) * 2;

  // Animação de pernas correndo
  const legT = player.wingFrame * 0.22;
  const legA = Math.sin(legT) * tp * 14;
  const legB = Math.sin(legT + Math.PI) * tp * 14;

  const ph = getPhase();

  // Cores da capa por fase
  const palettes = [
    ['#060e38','#0e1c6c','#1830a8','rgba(50,90,240,0.55)'],   // ph1 azul noite
    ['#1c0c04','#581e06','#962e0e','rgba(190,70,15,0.55)'],   // ph2 brasa escura
    ['#040e06','#0a2c0e','#124e18','rgba(20,130,40,0.55)'],   // ph3 floresta escura
    ['#060920','#0c1244','#142278','rgba(35,65,190,0.55)'],   // ph4 void azul
    ['#160504','#3a0e0e','#680e0e','rgba(170,25,18,0.55)'],   // ph5 sangue
    ['#0e0418','#280840','#480e6a','rgba(140,30,180,0.55)'],  // ph6 castelo roxo
    ['#180206','#3a0808','#6a0e12','rgba(180,20,30,0.55)'],   // ph7 cemitério
    ['#0a0418','#1e0840','#3a0e6a','rgba(180,40,255,0.55)'],  // ph8 cyberpunk
    ['#0a1005','#1a2a0a','#2a4012','rgba(40,160,30,0.55)'],   // ph9 floresta terror
    ['#1a1005','#3a2810','#5a4020','rgba(255,200,60,0.55)'],  // ph10 jardim celestial
  ];
  const [cDk, cMd, cBrt, cRim] = palettes[Math.min(ph-1,9)];

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h);
  ctx.scale(f, 1);

  // === PERNAS (aparecem abaixo da capa) ===
  ctx.strokeStyle = '#0c0c0c'; ctx.lineWidth = 2.8; ctx.lineCap = 'round';
  for (const [ox, la] of [[L(2,3), legA], [L(-2,0), -legA]]) {
    const kx = ox + la, ky = L(-6,-8) - Math.abs(la)*0.2;
    const fx = ox + la * 0.55, fy = L(-2,-1) - Math.abs(la)*0.1;
    ctx.beginPath(); ctx.moveTo(ox, -13); ctx.lineTo(kx, ky); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(fx, fy); ctx.stroke();
  }

  // === CAPA ===
  // 5 pontos-âncora lerped: frente (simétrica) → perfil (capa voa para trás)
  // x positivo = para frente (direção de movimento), x negativo = para trás
  const Ax = L(-9, -12+flt*0.4),   Ay = L(-42, -42+flt*0.2); // topo-trás do capuz
  const Bx = L( 9,  7),            By = L(-42, -42);           // topo-frente do capuz
  const Cx = L(18+flt*0.2, 14),    Cy = L(-7,  -5);            // borda frontal baixo
  const Dx = L( 0,  1),            Dy = L( 4,   4);            // centro baixo
  const Ex = L(-18-flt*0.2, -14+flt*0.5), Ey = L(-7, -5+flt*0.5); // borda traseira baixo

  const cg = ctx.createLinearGradient(0,-44, 0,5);
  cg.addColorStop(0, cBrt); cg.addColorStop(0.35, cMd); cg.addColorStop(1, cDk);
  ctx.fillStyle = cg;
  ctx.strokeStyle = cRim;
  ctx.lineWidth = 0.9;

  ctx.beginPath();
  ctx.moveTo(Ax, Ay);
  // Arco do capuz (A→B)
  ctx.bezierCurveTo(
    L(-3,-10+flt*0.3), L(-47,-47+flt*0.2),
    L( 3,  5),         L(-47,-47),
    Bx, By);
  // Borda frontal descendo (B→C)
  ctx.bezierCurveTo(
    L(18+flt*0.15, 13), L(-30,-28),
    L(18+flt*0.15, 13), L(-14,-12),
    Cx, Cy);
  // Borda baixo (C→D→E)
  ctx.bezierCurveTo(L(14,10), L(3,3), L(6,5+flt*0.2), L(4,4), Dx, Dy);
  ctx.bezierCurveTo(L(-6,-3+flt*0.2), L(4,4), L(-14,-10+flt*0.3), L(3,1), Ex, Ey);
  // Borda traseira subindo (E→A)
  ctx.bezierCurveTo(
    L(-18-flt*0.15,-14+flt*0.6), L(-14+flt,-6+flt*0.8),
    L(-13,-36+flt*0.3),           L(-22,-42+flt*0.4),
    Ax, Ay);
  ctx.fill();
  ctx.stroke();

  // Destaque brilhante no topo do capuz
  ctx.save();
  ctx.strokeStyle = cBrt; ctx.globalAlpha = 0.45; ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(Ax, Ay);
  ctx.bezierCurveTo(
    L(-3,-10+flt*0.3), L(-47,-47+flt*0.2),
    L( 3,  5),         L(-47,-47),
    Bx, By);
  ctx.stroke();
  ctx.restore();

  // === CORPO (pequeno núcleo escuro) ===
  ctx.fillStyle = '#080808';
  ctx.beginPath(); ctx.ellipse(L(1,2), -23, L(3.5,3), 7, 0, 0, Math.PI*2); ctx.fill();

  // === OLHOS AMARELOS ===
  const ex1 = L(3, 5),  ey1 = -35; // olho da frente
  const ex2 = L(-3, 1), ey2 = -35; // olho de trás (some)

  // Halo dos olhos
  ctx.save(); ctx.globalCompositeOperation = 'screen';
  const eg = ctx.createRadialGradient(ex1, ey1, 0, ex1, ey1, 12);
  eg.addColorStop(0, `rgba(255,235,10,${gInt*0.75})`);
  eg.addColorStop(0.5, `rgba(255,140,0,${gInt*0.28})`);
  eg.addColorStop(1, 'rgba(200,60,0,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(ex1, ey1, 12, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Íris
  ctx.fillStyle = `rgba(255,222,18,${gInt})`;
  ctx.beginPath(); ctx.ellipse(ex1, ey1, 3.6, 2.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.save(); ctx.globalAlpha = L(1, 0.05);
  ctx.beginPath(); ctx.ellipse(ex2, ey2, 3.6, 2.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Pupila
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ex1, ey1, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.save(); ctx.globalAlpha = L(1, 0.05);
  ctx.beginPath(); ctx.arc(ex2, ey2, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Brilho ambiente dos olhos
  ctx.save(); ctx.globalCompositeOperation = 'screen';
  const ag = ctx.createRadialGradient(ex1, ey1, 0, ex1, ey1, 20);
  ag.addColorStop(0, `rgba(255,220,10,${gInt*0.38})`);
  ag.addColorStop(1, 'rgba(200,80,0,0)');
  ctx.fillStyle = ag;
  ctx.beginPath(); ctx.arc(ex1, ey1, 20, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawDustParticles() {
  ctx.save();
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const d = dustParticles[i];
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.04;
    d.life -= 0.03;
    if (d.life <= 0) { dustParticles.splice(i, 1); continue; }
    const sx = d.x - camX;
    ctx.globalAlpha = d.life * 0.45;
    ctx.fillStyle = '#8a7e6a';
    ctx.beginPath();
    ctx.arc(sx, d.y, d.size * d.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawLandingEffects() {
  const neon = [
    [0,  240, 210],  // ph1 ciano
    [255,130,  0],   // ph2 laranja
    [60, 255,  60],  // ph3 verde
    [80, 160, 255],  // ph4 azul
    [255, 50,  30],  // ph5 vermelho
    [180, 40, 220],  // ph6 roxo
    [200, 20, 30],   // ph7 sangue
    [180, 40, 255],  // ph8 cyberpunk
  ];
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = landingEffects.length - 1; i >= 0; i--) {
    const e = landingEffects[i];
    e.t += 0.032;
    if (e.t >= 1) { landingEffects.splice(i, 1); continue; }
    const [r,g,b] = neon[Math.min(e.ph-1, 7)];

    // Coords da plataforma em tela
    const spx = e.px - camX;       // borda esquerda
    const spy = e.py;               // topo da plataforma
    const spw = e.pw;               // largura
    const scx = e.cx - camX;       // ponto de pouso (centro)

    // Spread: expande do ponto de pouso para as bordas, rápido
    const spreadT = Math.min(e.t * 3, 1);
    const halfSpread = spreadT * (spw / 2 + 8);
    const alpha = Math.pow(1 - e.t, 1.3);

    // Clip estrito ao rect da plataforma — nada escapa para fora
    ctx.save();
    ctx.beginPath();
    ctx.rect(spx, spy, spw, e.ht);
    ctx.clip();

    const left  = Math.max(spx,       scx - halfSpread);
    const right = Math.min(spx + spw, scx + halfSpread);
    const width = right - left;
    if (width > 0) {
      // 1) Linha neon no topo (borda superior da plataforma)
      const lg = ctx.createLinearGradient(left, spy, right, spy);
      lg.addColorStop(0,    `rgba(${r},${g},${b},0)`);
      lg.addColorStop(0.15, `rgba(${r},${g},${b},${alpha})`);
      lg.addColorStop(0.5,  `rgba(${r},${g},${b},${alpha})`);
      lg.addColorStop(0.85, `rgba(${r},${g},${b},${alpha})`);
      lg.addColorStop(1,    `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = lg;
      ctx.fillRect(left, spy, width, 2);

      // 2) Glow que preenche o interior da plataforma (de cima para baixo)
      const bg = ctx.createLinearGradient(scx, spy, scx, spy + e.ht);
      bg.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.45})`);
      bg.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = bg;
      ctx.fillRect(left, spy, width, e.ht);

      // 3) Flash radial inicial no centro do impacto
      if (e.t < 0.35) {
        const fi = (1 - e.t / 0.35) * 0.55;
        const fg = ctx.createRadialGradient(scx, spy, 0, scx, spy + e.ht * 0.5, e.ht * 1.2);
        fg.addColorStop(0, `rgba(${r},${g},${b},${fi})`);
        fg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fg;
        ctx.fillRect(spx, spy, spw, e.ht);
      }
    }
    ctx.restore(); // remove clip
  }
  ctx.restore();
}

function drawLight() {
  const phase = getPhase() >= 3 ? getPhase() : 1; // Fase 3+ tem luz própria, 1+2 = ciano
  const T = tick * 0.018;
  player.flickerPhase += 0.13 + Math.random()*0.06;
  const fl = 1 + Math.sin(player.flickerPhase)*0.08 + Math.random()*0.03;
  const cx = player.x - camX + player.w/2;
  const cy = player.y + player.h - 32; // olhos do fantasma

  ctx.save(); ctx.globalCompositeOperation='screen';

  if (phase === 1) {
    // Luz do vagalume ciano — ilumina tudo ao redor
    const R = 260 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(160,255,240,0.55)');
    pg.addColorStop(0.3,'rgba(0,220,200,0.28)');
    pg.addColorStop(0.65,'rgba(0,160,180,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    // Anel de luz pulsante
    const ring = 0.06 + Math.sin(T*2.8)*0.03;
    const rg = ctx.createRadialGradient(cx,cy,R*0.7,cx,cy,R*0.85);
    rg.addColorStop(0,'rgba(0,0,0,0)');
    rg.addColorStop(0.5,`rgba(0,200,180,${ring})`);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);

  } else if (phase === 2) {
    // Luz laranja quente — ilumina a caverna vulcânica
    const R = 280 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(255,200,80,0.52)');
    pg.addColorStop(0.3,'rgba(220,100,20,0.30)');
    pg.addColorStop(0.65,'rgba(160,50,5,0.12)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    // Pulsação de calor
    const heatPulse = 0.08 + Math.sin(T*2.1)*0.04;
    const hg = ctx.createRadialGradient(cx,cy,R*0.6,cx,cy,R*0.9);
    hg.addColorStop(0,'rgba(0,0,0,0)');
    hg.addColorStop(0.5,`rgba(255,80,0,${heatPulse})`);
    hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);

  } else if (phase === 3) {
    // Luz verde-amarelada do vagalume + halo elétrico roxo
    const R = 240 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(200,255,80,0.50)');
    pg.addColorStop(0.25,'rgba(100,220,20,0.28)');
    pg.addColorStop(0.6,'rgba(50,180,0,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const elec = 0.10 + Math.sin(T*3.5)*0.06;
    const eg = ctx.createRadialGradient(cx,cy,R*0.55,cx,cy,R*0.85);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(0.5,`rgba(180,80,255,${elec})`);
    eg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);

  } else if (phase === 4) {
    // Fase 4 — Luz gelo/branca estelar + anel azul-branco frio
    const R = 255 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(220,240,255,0.54)');
    pg.addColorStop(0.28,'rgba(140,185,255,0.28)');
    pg.addColorStop(0.62,'rgba(70,110,230,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const icePulse = 0.07 + Math.sin(T*3.1)*0.038;
    const ig = ctx.createRadialGradient(cx,cy,R*0.60,cx,cy,R*0.87);
    ig.addColorStop(0,'rgba(0,0,0,0)');
    ig.addColorStop(0.5,`rgba(160,205,255,${icePulse})`);
    ig.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ig; ctx.fillRect(0,0,W,H);

  } else if (phase === 5) {
    // Fase 5 — Luz âmbar-carmesim, quente e opressiva
    const R = 270 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(255,162,42,0.57)');
    pg.addColorStop(0.28,'rgba(220,70,15,0.30)');
    pg.addColorStop(0.62,'rgba(150,25,5,0.12)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const firePulse = 0.10 + Math.sin(T*4.2)*0.065;
    const fg = ctx.createRadialGradient(cx,cy,R*0.50,cx,cy,R*0.82);
    fg.addColorStop(0,'rgba(0,0,0,0)');
    fg.addColorStop(0.5,`rgba(255,100,0,${firePulse})`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);

  } else if (phase === 6) {
    // Fase 6 — Luz roxa sinistra com pulsação vermelha
    const R = 250 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(200,120,255,0.50)');
    pg.addColorStop(0.28,'rgba(140,40,180,0.28)');
    pg.addColorStop(0.62,'rgba(80,10,100,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const darkPulse = 0.08 + Math.sin(T*3.8)*0.05;
    const dg = ctx.createRadialGradient(cx,cy,R*0.55,cx,cy,R*0.85);
    dg.addColorStop(0,'rgba(0,0,0,0)');
    dg.addColorStop(0.5,`rgba(200,0,40,${darkPulse})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=dg; ctx.fillRect(0,0,W,H);

  } else if (phase === 7) {
    // Fase 7 — Luz vermelha sangue com pulsação escura
    const R = 240 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(255,80,60,0.48)');
    pg.addColorStop(0.28,'rgba(180,20,15,0.26)');
    pg.addColorStop(0.62,'rgba(100,5,5,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const bloodPulse = 0.09 + Math.sin(T*2.5)*0.06;
    const bg = ctx.createRadialGradient(cx,cy,R*0.50,cx,cy,R*0.82);
    bg.addColorStop(0,'rgba(0,0,0,0)');
    bg.addColorStop(0.5,`rgba(180,0,10,${bloodPulse})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  } else if (phase === 8) {
    // Fase 8 — Luz neon cyberpunk pulsante
    const R = 260 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(200,80,255,0.45)');
    pg.addColorStop(0.28,'rgba(120,20,200,0.25)');
    pg.addColorStop(0.62,'rgba(60,5,100,0.10)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const neonPulse = 0.08 + Math.sin(T*4.0)*0.05;
    const ng = ctx.createRadialGradient(cx,cy,R*0.45,cx,cy,R*0.80);
    ng.addColorStop(0,'rgba(0,0,0,0)');
    ng.addColorStop(0.5,`rgba(0,200,255,${neonPulse})`);
    ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);

  } else {
    // Fase 9 — Luz verde fantasmagórica com pulsação irregular
    const R = 230 * fl;
    const pg = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    pg.addColorStop(0,'rgba(80,220,60,0.40)');
    pg.addColorStop(0.28,'rgba(30,120,15,0.22)');
    pg.addColorStop(0.62,'rgba(10,60,5,0.08)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(0,0,W,H);
    const forestPulse = 0.06 + Math.sin(T*1.8)*0.04 + Math.sin(T*3.7)*0.02;
    const fg2 = ctx.createRadialGradient(cx,cy,R*0.40,cx,cy,R*0.78);
    fg2.addColorStop(0,'rgba(0,0,0,0)');
    fg2.addColorStop(0.5,`rgba(40,180,20,${forestPulse})`);
    fg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg2; ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}

function drawHUD() {
  if (flashAlpha > 0) {
    ctx.save(); ctx.globalAlpha = flashAlpha; ctx.fillStyle = '#6b0000'; ctx.fillRect(0,0,W,H); ctx.restore();
    flashAlpha = Math.max(0, flashAlpha - 0.04);
  }

  const phase = getPhase();
  const pct = player.x / WORLD_W;

  // ── Contador de pulos (canto superior direito) ──────────────
  ctx.save();
  ctx.textAlign = 'right';
  const jumpCol = ['#00e8c8','#ffb030','#b060ff','#88aaff','#ff7020','#c040ff','#ff2020','#b428ff','#1aff3a','#ffd040'][phase-1] || '#ffd040';
  ctx.font = 'bold 13px Georgia';
  ctx.fillStyle = jumpCol;
  ctx.globalAlpha = 0.85;
  ctx.fillText(`${jumpCount} pulos`, W - 14, 22);
  ctx.textAlign = 'left';
  ctx.restore();

  // ── Barra de progresso (fina, topo) ─────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, 4);
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = jumpCol;
  ctx.fillRect(0, 0, W * Math.min(pct, 1), 4);
  ctx.restore();

  // ── Tela de fim ─────────────────────────────────────────────
  if (pct >= 0.99) {
    if (!gameFinished) {
      gameFinished = true;
      const best = parseInt(localStorage.getItem('vgBest') || '999999');
      if (jumpCount < best) localStorage.setItem('vgBest', jumpCount);
      stopAmbient();
      sfxFinish();
      // Inicializa fogos de artifício
      if (!window._fireworks) window._fireworks = [];
      for (let i = 0; i < 30; i++) {
        window._fireworks.push({
          x: W*0.2 + Math.random()*W*0.6,
          y: H*0.2 + Math.random()*H*0.4,
          vx: (Math.random()-0.5)*3,
          vy: (Math.random()-0.5)*3,
          life: 1.0,
          hue: Math.floor(Math.random()*360),
          size: 2+Math.random()*4
        });
      }
    }
    const best = parseInt(localStorage.getItem('vgBest') || jumpCount);
    const rating =
      jumpCount <= 500  ? ['LENDÁRIO',  '#ffe040'] :
      jumpCount <= 800  ? ['MESTRE',    '#00e8c8'] :
      jumpCount <= 1200 ? ['HABILIDOSO','#88aaff'] :
      jumpCount <= 2000 ? ['APRENDIZ',  '#ffb030'] :
                          ['SOBREVIVENTE','#cc4444'];
    const stars =
      jumpCount <= 500  ? '★★★★★' :
      jumpCount <= 800  ? '★★★★☆' :
      jumpCount <= 1200 ? '★★★☆☆' :
      jumpCount <= 2000 ? '★★☆☆☆' : '★☆☆☆☆';

    const T2 = tick * 0.018;
    ctx.save();
    // Fundo escuro semi-transparente com tom dourado
    const endBg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, H*0.8);
    endBg.addColorStop(0, 'rgba(20,12,5,0.82)');
    endBg.addColorStop(1, 'rgba(5,2,10,0.90)');
    ctx.fillStyle = endBg;
    ctx.fillRect(0, 0, W, H);

    // Fogos de artifício animados
    if (window._fireworks) {
      // Adiciona novos fogos periodicamente
      if (tick % 8 === 0) {
        window._fireworks.push({
          x: W*0.1 + Math.random()*W*0.8,
          y: H*0.1 + Math.random()*H*0.5,
          vx: (Math.random()-0.5)*2.5,
          vy: (Math.random()-0.5)*2.5,
          life: 1.0,
          hue: Math.floor(Math.random()*360),
          size: 2+Math.random()*4
        });
      }
      ctx.globalCompositeOperation = 'screen';
      for (let i = window._fireworks.length - 1; i >= 0; i--) {
        const fw = window._fireworks[i];
        fw.x += fw.vx; fw.y += fw.vy; fw.vy += 0.03;
        fw.life -= 0.012;
        if (fw.life <= 0) { window._fireworks.splice(i, 1); continue; }
        ctx.globalAlpha = fw.life * 0.8;
        const fwg = ctx.createRadialGradient(fw.x, fw.y, 0, fw.x, fw.y, fw.size*3);
        fwg.addColorStop(0, `hsla(${fw.hue},90%,70%,1)`);
        fwg.addColorStop(0.5, `hsla(${fw.hue},80%,50%,0.5)`);
        fwg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fwg;
        ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.size*3, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.globalAlpha = 1;
    ctx.textAlign = 'center';

    // Título principal
    const titlePulse = 0.92 + Math.sin(T2*1.5)*0.08;
    ctx.globalAlpha = titlePulse;
    ctx.fillStyle = '#ffe040';
    ctx.font = 'bold 32px Georgia';
    ctx.letterSpacing = '6px';
    ctx.fillText('✦ PARABÉNS, CAMPEÃO! ✦', W/2, H/2 - 100);

    // Linha decorativa dourada
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = 'rgba(255,200,60,0.40)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2-220, H/2-78); ctx.lineTo(W/2+220, H/2-78); ctx.stroke();
    ctx.globalAlpha = 1;

    // Dois vagalumes juntos (o reencontro)
    const vx1 = W/2 - 22 + Math.sin(T2*1.2)*4;
    const vy1 = H/2 - 48 + Math.sin(T2*0.9)*3;
    const vx2 = W/2 + 22 + Math.sin(T2*1.2+1)*4;
    const vy2 = H/2 - 48 + Math.sin(T2*0.9+0.5)*3;
    // Glow dos vagalumes
    for (const [vx,vy,col] of [[vx1,vy1,'rgba(120,220,40,'],[vx2,vy2,'rgba(255,180,220,']]) {
      const vg = ctx.createRadialGradient(vx, vy, 0, vx, vy, 22);
      vg.addColorStop(0, col+'0.6)'); vg.addColorStop(0.5, col+'0.2)'); vg.addColorStop(1, col+'0)');
      ctx.fillStyle = vg;
      ctx.beginPath(); ctx.arc(vx, vy, 22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = col+'0.9)';
      ctx.beginPath(); ctx.arc(vx, vy, 4, 0, Math.PI*2); ctx.fill();
    }
    // Coração entre eles
    const hx = W/2, hy = H/2 - 55;
    const heartPulse = 0.7 + Math.sin(T2*3)*0.3;
    ctx.save();
    ctx.globalAlpha = heartPulse * 0.8;
    ctx.fillStyle = '#ff4060';
    ctx.translate(hx, hy);
    ctx.scale(0.5, 0.5);
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.bezierCurveTo(-8, -14, -18, -4, 0, 10);
    ctx.bezierCurveTo(18, -4, 8, -14, 0, -4);
    ctx.fill();
    ctx.restore();

    // Subtítulo
    ctx.fillStyle = 'rgba(255,220,180,0.85)';
    ctx.font = '14px Georgia';
    ctx.letterSpacing = '3px';
    ctx.fillText('O vagalume encontrou sua companheira! ✦', W/2, H/2 - 20);

    // Número de pulos — grande e central
    const pulse = 0.90 + Math.sin(T2*1.8)*0.10;
    ctx.globalAlpha = pulse;
    ctx.font = 'bold 56px Georgia';
    ctx.letterSpacing = '2px';
    ctx.fillStyle = rating[1];
    ctx.fillText(jumpCount, W/2, H/2 + 38);
    ctx.globalAlpha = 1;
    ctx.font = '12px Georgia';
    ctx.letterSpacing = '4px';
    ctx.fillStyle = 'rgba(255,220,180,0.55)';
    ctx.fillText('PULOS TOTAIS', W/2, H/2 + 56);

    // Estrelas
    ctx.font = 'bold 22px Georgia';
    ctx.letterSpacing = '6px';
    ctx.fillStyle = rating[1];
    ctx.fillText(stars, W/2, H/2 + 86);

    // Rating
    ctx.font = 'bold 16px Georgia';
    ctx.letterSpacing = '5px';
    ctx.fillStyle = rating[1];
    ctx.fillText(rating[0], W/2, H/2 + 110);

    // Melhor pontuação / Novo recorde
    if (best < jumpCount) {
      ctx.font = '11px Georgia';
      ctx.letterSpacing = '2px';
      ctx.fillStyle = 'rgba(255,200,60,0.70)';
      ctx.fillText(`melhor: ${best} pulos`, W/2, H/2 + 134);
    } else {
      ctx.font = 'bold 13px Georgia';
      ctx.letterSpacing = '3px';
      ctx.fillStyle = 'rgba(255,220,60,0.90)';
      ctx.fillText('✦ NOVO RECORDE! ✦', W/2, H/2 + 134);
    }

    // Reiniciar
    const blinkA = 0.50 + Math.sin(T2*2.2)*0.30;
    ctx.globalAlpha = blinkA;
    ctx.font = '11px Georgia';
    ctx.letterSpacing = '3px';
    ctx.fillStyle = 'rgba(255,200,100,0.85)';
    ctx.fillText('✦ clique ou pressione qualquer tecla para jogar novamente ✦', W/2, H/2 + 165);

    ctx.textAlign = 'left';
    ctx.restore();
    return;
  }

  // ── Notificação de fase ──────────────────────────────────────
  if (phaseNotifAlpha > 0) {
    ctx.save();
    const na = Math.min(1, phaseNotifAlpha);
    ctx.globalAlpha = na * na;
    const phNames = ['','Floresta Sombria','Oceano Profundo','Cristal Elétrico','Vazio Estelar','Abismo Carmesim','Castelo Assombrado','Cemitério Maldito','Neon District','Floresta do Terror','Jardim Celestial'];
    const phColor = ['','rgba(0,230,200,0.95)','rgba(0,180,240,0.95)','rgba(160,80,255,0.95)','rgba(130,190,255,0.95)','rgba(255,80,30,0.95)','rgba(180,50,220,0.95)','rgba(200,20,30,0.95)','rgba(180,40,255,0.95)','rgba(30,200,50,0.95)','rgba(255,200,60,0.95)'];
    ctx.fillStyle = phColor[phase] || 'rgba(0,230,200,0.95)';
    ctx.font = 'bold 38px Georgia'; ctx.textAlign = 'center'; ctx.letterSpacing = '6px';
    ctx.fillText(`✦ FASE ${phase} ✦`, W/2, H/2 - 10);
    if (phNames[phase]) {
      ctx.font = '16px Georgia'; ctx.letterSpacing = '4px';
      ctx.fillText(phNames[phase].toUpperCase(), W/2, H/2 + 18);
    }
    ctx.textAlign = 'left';
    phaseNotifAlpha -= 0.014;
    ctx.restore();
  }
}

// ── ÁUDIO IMERSIVO ────────────────────────────────────────────
let AC = null, masterVol, reverbNode, ambientGain;
let ambTimer = null, ambPhaseId = 0;
let continuousNodes = []; // nodes that play continuously per phase
let sfxTimers = []; // random environmental sfx timers

function createNoiseBuffer(duration, type) {
  if (!AC) return null;
  const len = AC.sampleRate * duration;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const data = buf.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < len; i++) {
      last = (last + (Math.random() * 2 - 1) * 0.02) * 0.998;
      data[i] = last * 10;
    }
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  }
  return buf;
}

function createReverb(decay, wet) {
  if (!AC) return null;
  const len = AC.sampleRate * decay;
  const buf = AC.createBuffer(2, len, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2.5);
    }
  }
  const conv = AC.createConvolver();
  conv.buffer = buf;
  const wetGain = AC.createGain();
  wetGain.gain.value = wet;
  conv.connect(wetGain);
  wetGain.connect(masterVol);
  return conv;
}

function initAudio() {
  if (AC) { AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterVol = AC.createGain(); masterVol.gain.value = 0.5; masterVol.connect(AC.destination);
  ambientGain = AC.createGain(); ambientGain.gain.value = 0.35; ambientGain.connect(masterVol);
  reverbNode = createReverb(2.5, 0.3);
  startAmbient(getPhase());
}

// ── SFX DE JOGO ───────────────────────────────────────────────
function sfxJump() {
  if (!AC) return;
  const ph = getPhase();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(masterVol);
  if (reverbNode) { const g2 = AC.createGain(); g2.gain.value = 0.3; o.connect(g2); g2.connect(reverbNode); }
  o.type = (['square','triangle','sine','sine','sawtooth','sawtooth','square'])[Math.min(ph-1,6)];
  const [f1,f2] = ([[160,640],[150,460],[130,370],[110,290],[95,240],[85,200],[75,180]])[Math.min(ph-1,6)];
  o.frequency.setValueAtTime(f1, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2, AC.currentTime + 0.08);
  g.gain.setValueAtTime(0.11, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.13);
  o.start(); o.stop(AC.currentTime + 0.14);
  // Wing flutter sound
  const nBuf = createNoiseBuffer(0.08, 'white');
  if (nBuf) {
    const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
    ns.buffer = nBuf; nf.type = 'bandpass'; nf.frequency.value = 2000 + ph*500; nf.Q.value = 2;
    ns.connect(nf); nf.connect(ng); ng.connect(masterVol);
    ng.gain.setValueAtTime(0.06, AC.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.07);
    ns.start(); ns.stop(AC.currentTime + 0.08);
  }
}

function sfxLand() {
  if (!AC) return;
  const nBuf = createNoiseBuffer(0.12, 'brown');
  if (nBuf) {
    const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
    ns.buffer = nBuf; nf.type = 'lowpass'; nf.frequency.value = 400;
    ns.connect(nf); nf.connect(ng); ng.connect(masterVol);
    ng.gain.setValueAtTime(0.08, AC.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.1);
    ns.start(); ns.stop(AC.currentTime + 0.12);
  }
}

function sfxFinish() {
  if (!AC) return;
  const notes = [[261,'sine'],[329,'sine'],[392,'triangle'],[523,'sine'],[784,'sine'],[1046,'sine']];
  notes.forEach(([f,tp], i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(masterVol);
    if (reverbNode) { const g2 = AC.createGain(); g2.gain.value = 0.5; o.connect(g2); g2.connect(reverbNode); }
    o.type = tp; o.frequency.value = f;
    const t = AC.currentTime + i * 0.12;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.10, t + 0.08);
    g.gain.linearRampToValueAtTime(0.10, t + 0.45);
    g.gain.linearRampToValueAtTime(0, t + 1.1);
    o.start(t); o.stop(t + 1.2);
  });
}

function sfxDeath() {
  if (!AC) return;
  // Impact thud
  const nBuf = createNoiseBuffer(0.4, 'brown');
  if (nBuf) {
    const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
    ns.buffer = nBuf; nf.type = 'lowpass'; nf.frequency.value = 200;
    ns.connect(nf); nf.connect(ng); ng.connect(masterVol);
    ng.gain.setValueAtTime(0.15, AC.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.35);
    ns.start(); ns.stop(AC.currentTime + 0.4);
  }
  [0, 0.07, 0.14].forEach((d, i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(masterVol);
    o.type = 'sawtooth';
    const t = AC.currentTime + d;
    o.frequency.setValueAtTime(380 - i*60, t);
    o.frequency.exponentialRampToValueAtTime(35, t + 0.5);
    g.gain.setValueAtTime(0.13, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.start(t); o.stop(t + 0.52);
  });
}

function sfxPhaseChange(ph) {
  if (!AC) return;
  // Whoosh transition
  const nBuf = createNoiseBuffer(0.8, 'pink');
  if (nBuf) {
    const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
    ns.buffer = nBuf; nf.type = 'bandpass'; nf.frequency.value = 800;
    nf.frequency.linearRampToValueAtTime(3000, AC.currentTime + 0.3);
    nf.frequency.linearRampToValueAtTime(200, AC.currentTime + 0.7);
    ns.connect(nf); nf.connect(ng); ng.connect(masterVol);
    ng.gain.setValueAtTime(0.12, AC.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.7);
    ns.start(); ns.stop(AC.currentTime + 0.8);
  }
  const chords = {
    2: [[392,'triangle'],[494,'triangle'],[587,'triangle'],[784,'triangle']],
    3: [[130,'square'],[155,'square'],[196,'square'],[233,'square'],[277,'sine']],
    4: [[65,'sine'],[98,'sine'],[131,'sine'],[196,'triangle'],[261,'sine'],[392,'sine']],
    5: [[41,'sine'],[55,'sawtooth'],[82,'sine'],[110,'sawtooth'],[138,'sine'],[165,'sawtooth'],[220,'sine']],
    6: [[55,'sawtooth'],[65,'square'],[82,'sawtooth'],[98,'square'],[110,'sine'],[131,'sawtooth'],[165,'square'],[196,'sawtooth']],
    7: [[41,'square'],[49,'sawtooth'],[55,'square'],[65,'sawtooth'],[82,'square'],[98,'sawtooth'],[110,'square'],[131,'sawtooth'],[165,'square']]
  };
  (chords[ph]||[]).forEach(([f,tp],i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(masterVol);
    if (reverbNode) { const g2 = AC.createGain(); g2.gain.value = 0.4; o.connect(g2); g2.connect(reverbNode); }
    o.type = tp; o.frequency.value = f;
    const t = AC.currentTime + i * 0.09;
    g.gain.setValueAtTime(0.14, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.start(t); o.stop(t + 0.52);
  });
}

// ── PARAR AMBIENT ─────────────────────────────────────────────
function stopAmbient() {
  clearTimeout(ambTimer); ambTimer = null; ambPhaseId++;
  sfxTimers.forEach(t => clearTimeout(t)); sfxTimers = [];
  continuousNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  continuousNodes = [];
}

function startAmbient(ph) {
  stopAmbient();
  const id = ambPhaseId;
  if (!AC) return;
  // Start continuous ambient layer
  startContinuousAmbient(ph, id);
  // Start melodic ambient
  if (ph === 1) { ambPhase1.i = 0; ambPhase1(id); }
  else if (ph === 2) { ambPhase2.i = 0; ambPhase2(id); }
  else if (ph === 3) { ambPhase3.i = 0; ambPhase3(id); }
  else if (ph === 4) { ambPhase4.i = 0; ambPhase4(id); }
  else if (ph === 5) { ambPhase5.i = 0; ambPhase5(id); }
  else if (ph === 6) { ambPhase6.i = 0; ambPhase6(id); }
  else if (ph === 7) { ambPhase7.i = 0; ambPhase7(id); }
  else if (ph === 8) { ambPhase8.i = 0; ambPhase8(id); }
  else if (ph === 9) { ambPhase9.i = 0; ambPhase9(id); }
  else { ambPhase10.i = 0; ambPhase10(id); }
  // Start random environmental sfx
  startEnvSfx(ph, id);
}

// ── CAMADA CONTÍNUA DE AMBIENTE ───────────────────────────────
function startContinuousAmbient(ph, id) {
  if (!AC || ambPhaseId !== id) return;

  if (ph === 1) {
    // Floresta: vento suave filtrado + grilos (noise bandpass alto)
    const windBuf = createNoiseBuffer(4, 'pink');
    if (windBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = windBuf; ws.loop = true;
      wf.type = 'lowpass'; wf.frequency.value = 600; wf.Q.value = 0.7;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.12;
      ws.start(); continuousNodes.push(ws);
      // LFO no filtro do vento (rajadas)
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.15;
      lfoG.gain.value = 300;
      lfo.connect(lfoG); lfoG.connect(wf.frequency);
      lfo.start(); continuousNodes.push(lfo);
    }
    // Grilos: noise bandpass agudo
    const cricketBuf = createNoiseBuffer(2, 'white');
    if (cricketBuf) {
      const cs = AC.createBufferSource(), cf = AC.createBiquadFilter(), cg = AC.createGain();
      cs.buffer = cricketBuf; cs.loop = true;
      cf.type = 'bandpass'; cf.frequency.value = 4800; cf.Q.value = 15;
      cs.connect(cf); cf.connect(cg); cg.connect(ambientGain);
      cg.gain.value = 0.04;
      // Pulsar grilos
      const clfo = AC.createOscillator(), clfoG = AC.createGain();
      clfo.type = 'square'; clfo.frequency.value = 7;
      clfoG.gain.value = 0.04;
      clfo.connect(clfoG); clfoG.connect(cg.gain);
      cs.start(); clfo.start();
      continuousNodes.push(cs, clfo);
    }
  } else if (ph === 2) {
    // Oceano: corrente subaquática (brown noise filtrado) + bolhas contínuas
    const waterBuf = createNoiseBuffer(4, 'brown');
    if (waterBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = waterBuf; ws.loop = true;
      wf.type = 'lowpass'; wf.frequency.value = 350; wf.Q.value = 1.5;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.18;
      // Ondulação lenta
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.08;
      lfoG.gain.value = 0.08;
      lfo.connect(lfoG); lfoG.connect(wg.gain);
      ws.start(); lfo.start();
      continuousNodes.push(ws, lfo);
    }
    // Ressonância subaquática contínua
    const drone = AC.createOscillator(), dg = AC.createGain();
    drone.type = 'sine'; drone.frequency.value = 85;
    dg.gain.value = 0.025;
    drone.connect(dg); dg.connect(ambientGain);
    drone.start(); continuousNodes.push(drone);
  } else if (ph === 3) {
    // Cidade: chuva (white noise filtrado)
    const rainBuf = createNoiseBuffer(3, 'white');
    if (rainBuf) {
      const rs = AC.createBufferSource(), rf = AC.createBiquadFilter(), rg = AC.createGain();
      rs.buffer = rainBuf; rs.loop = true;
      rf.type = 'highpass'; rf.frequency.value = 2000; rf.Q.value = 0.3;
      rs.connect(rf); rf.connect(rg); rg.connect(ambientGain);
      rg.gain.value = 0.08;
      rs.start(); continuousNodes.push(rs);
    }
    // Vento urbano
    const windBuf = createNoiseBuffer(4, 'pink');
    if (windBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = windBuf; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 400; wf.Q.value = 0.5;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.06;
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.25;
      lfoG.gain.value = 200;
      lfo.connect(lfoG); lfoG.connect(wf.frequency);
      ws.start(); lfo.start();
      continuousNodes.push(ws, lfo);
    }
    // Drone elétrico da cidade
    const hum = AC.createOscillator(), hg = AC.createGain();
    hum.type = 'sawtooth'; hum.frequency.value = 60;
    hg.gain.value = 0.012;
    hum.connect(hg); hg.connect(ambientGain);
    hum.start(); continuousNodes.push(hum);
  } else if (ph === 4) {
    // Espaço: drone cósmico profundo + radiação (noise muito filtrado)
    const drone1 = AC.createOscillator(), dg1 = AC.createGain();
    drone1.type = 'sine'; drone1.frequency.value = 40;
    dg1.gain.value = 0.035;
    drone1.connect(dg1); dg1.connect(ambientGain);
    // Vibrato lento
    const vib = AC.createOscillator(), vibG = AC.createGain();
    vib.type = 'sine'; vib.frequency.value = 0.05;
    vibG.gain.value = 3;
    vib.connect(vibG); vibG.connect(drone1.frequency);
    drone1.start(); vib.start();
    continuousNodes.push(drone1, vib);
    // Harmônico de quinta
    const drone2 = AC.createOscillator(), dg2 = AC.createGain();
    drone2.type = 'sine'; drone2.frequency.value = 60;
    dg2.gain.value = 0.015;
    drone2.connect(dg2); dg2.connect(ambientGain);
    drone2.start(); continuousNodes.push(drone2);
    // Radiação cósmica (noise agudo esparso)
    const radBuf = createNoiseBuffer(3, 'white');
    if (radBuf) {
      const rs = AC.createBufferSource(), rf = AC.createBiquadFilter(), rg = AC.createGain();
      rs.buffer = radBuf; rs.loop = true;
      rf.type = 'bandpass'; rf.frequency.value = 6000; rf.Q.value = 20;
      rs.connect(rf); rf.connect(rg); rg.connect(ambientGain);
      rg.gain.value = 0.015;
      rs.start(); continuousNodes.push(rs);
    }
  } else if (ph === 5) {
    // Vulcão: rumble profundo + chiado de vapor
    const rumbleBuf = createNoiseBuffer(4, 'brown');
    if (rumbleBuf) {
      const rs = AC.createBufferSource(), rf = AC.createBiquadFilter(), rg = AC.createGain();
      rs.buffer = rumbleBuf; rs.loop = true;
      rf.type = 'lowpass'; rf.frequency.value = 120; rf.Q.value = 2;
      rs.connect(rf); rf.connect(rg); rg.connect(ambientGain);
      rg.gain.value = 0.22;
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.3;
      lfoG.gain.value = 0.10;
      lfo.connect(lfoG); lfoG.connect(rg.gain);
      rs.start(); lfo.start();
      continuousNodes.push(rs, lfo);
    }
    const steamBuf = createNoiseBuffer(2, 'white');
    if (steamBuf) {
      const ss = AC.createBufferSource(), sf2 = AC.createBiquadFilter(), sg = AC.createGain();
      ss.buffer = steamBuf; ss.loop = true;
      sf2.type = 'bandpass'; sf2.frequency.value = 3000; sf2.Q.value = 3;
      ss.connect(sf2); sf2.connect(sg); sg.connect(ambientGain);
      sg.gain.value = 0.04;
      ss.start(); continuousNodes.push(ss);
    }
    const heat = AC.createOscillator(), hg = AC.createGain();
    heat.type = 'sawtooth'; heat.frequency.value = 55;
    hg.gain.value = 0.02;
    heat.connect(hg); hg.connect(ambientGain);
    heat.start(); continuousNodes.push(heat);
  } else if (ph === 6) {
    // Fase 6 — Castelo Assombrado: vento uivante + órgão sinistro + sussurros
    const windBuf = createNoiseBuffer(4, 'pink');
    if (windBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = windBuf; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 300; wf.Q.value = 1.5;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.14;
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.12;
      lfoG.gain.value = 250;
      lfo.connect(lfoG); lfoG.connect(wf.frequency);
      ws.start(); lfo.start();
      continuousNodes.push(ws, lfo);
    }
    const organNotes = [55, 65.4, 82.4];
    for (const freq of organNotes) {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      g.gain.value = 0.018;
      o.connect(g); g.connect(ambientGain);
      o.start(); continuousNodes.push(o);
    }
    const whisperBuf = createNoiseBuffer(3, 'white');
    if (whisperBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = whisperBuf; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 1200; wf.Q.value = 12;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.025;
      const slfo = AC.createOscillator(), slfoG = AC.createGain();
      slfo.type = 'sine'; slfo.frequency.value = 0.08;
      slfoG.gain.value = 0.02;
      slfo.connect(slfoG); slfoG.connect(wg.gain);
      ws.start(); slfo.start();
      continuousNodes.push(ws, slfo);
    }
  } else if (ph === 7) {
    // Fase 7 — Cemitério: vento uivante grave + coro fúnebre + batidas de coração
    const windBuf = createNoiseBuffer(4, 'brown');
    if (windBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = windBuf; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 180; wf.Q.value = 1.8;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.16;
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.09;
      lfoG.gain.value = 120;
      lfo.connect(lfoG); lfoG.connect(wf.frequency);
      ws.start(); lfo.start();
      continuousNodes.push(ws, lfo);
    }
    // (coro fúnebre removido — som irritante)
    // Batida de coração lenta
    const hbLfo = AC.createOscillator(), hbG = AC.createGain();
    hbLfo.type = 'sine'; hbLfo.frequency.value = 35;
    hbG.gain.value = 0.030;
    const hbMod = AC.createOscillator(), hbModG = AC.createGain();
    hbMod.type = 'sine'; hbMod.frequency.value = 1.1; // ~66 bpm
    hbModG.gain.value = 0.030;
    hbMod.connect(hbModG); hbModG.connect(hbG.gain);
    hbLfo.connect(hbG); hbG.connect(ambientGain);
    hbLfo.start(); hbMod.start();
    continuousNodes.push(hbLfo, hbMod);
    // Sussurros dos mortos
    const deathWhisper = createNoiseBuffer(3, 'white');
    if (deathWhisper) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = deathWhisper; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 900; wf.Q.value = 18;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.020;
      const slfo = AC.createOscillator(), slfoG = AC.createGain();
      slfo.type = 'sine'; slfo.frequency.value = 0.06;
      slfoG.gain.value = 0.018;
      slfo.connect(slfoG); slfoG.connect(wg.gain);
      ws.start(); slfo.start();
      continuousNodes.push(ws, slfo);
    }
  } else if (ph === 8) {
    // Fase 8 — Cyberpunk: chuva eletrônica + synth pad + buzzing neon
    const rainBuf = createNoiseBuffer(4, 'pink');
    if (rainBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = rainBuf; ws.loop = true;
      wf.type = 'highpass'; wf.frequency.value = 3000;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.06;
      ws.start(); continuousNodes.push(ws);
    }
    const synthNotes = [130.8, 155.6, 196, 233.1];
    for (const freq of synthNotes) {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      const lp = AC.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 400;
      g.gain.value = 0.012;
      o.connect(lp); lp.connect(g); g.connect(ambientGain);
      o.start(); continuousNodes.push(o);
    }
    const buzzO = AC.createOscillator(), buzzG = AC.createGain();
    buzzO.type = 'sawtooth'; buzzO.frequency.value = 60;
    buzzG.gain.value = 0.008;
    const buzzF = AC.createBiquadFilter();
    buzzF.type = 'bandpass'; buzzF.frequency.value = 120; buzzF.Q.value = 8;
    buzzO.connect(buzzF); buzzF.connect(buzzG); buzzG.connect(ambientGain);
    buzzO.start(); continuousNodes.push(buzzO);
  } else {
    // Fase 9 — Floresta do Terror: vento uivante + insetos + trovão distante + floresta densa
    const windBuf = createNoiseBuffer(4, 'brown');
    if (windBuf) {
      const ws = AC.createBufferSource(), wf = AC.createBiquadFilter(), wg = AC.createGain();
      ws.buffer = windBuf; ws.loop = true;
      wf.type = 'bandpass'; wf.frequency.value = 250; wf.Q.value = 1.2;
      ws.connect(wf); wf.connect(wg); wg.connect(ambientGain);
      wg.gain.value = 0.14;
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 0.10;
      lfoG.gain.value = 180;
      lfo.connect(lfoG); lfoG.connect(wf.frequency);
      ws.start(); lfo.start();
      continuousNodes.push(ws, lfo);
    }
    // Insetos/grilos noturnos
    const cricketBuf = createNoiseBuffer(2, 'white');
    if (cricketBuf) {
      const cs = AC.createBufferSource(), cf = AC.createBiquadFilter(), cg = AC.createGain();
      cs.buffer = cricketBuf; cs.loop = true;
      cf.type = 'bandpass'; cf.frequency.value = 5200; cf.Q.value = 18;
      cs.connect(cf); cf.connect(cg); cg.connect(ambientGain);
      cg.gain.value = 0.05;
      const clfo = AC.createOscillator(), clfoG = AC.createGain();
      clfo.type = 'square'; clfo.frequency.value = 8;
      clfoG.gain.value = 0.05;
      clfo.connect(clfoG); clfoG.connect(cg.gain);
      cs.start(); clfo.start();
      continuousNodes.push(cs, clfo);
    }
    // Drone grave ameaçador
    const drone = AC.createOscillator(), dg = AC.createGain();
    drone.type = 'sine'; drone.frequency.value = 38;
    dg.gain.value = 0.028;
    drone.connect(dg); dg.connect(ambientGain);
    drone.start(); continuousNodes.push(drone);
    // Sub harmônico pulsante
    const sub = AC.createOscillator(), sg = AC.createGain();
    sub.type = 'sine'; sub.frequency.value = 28;
    sg.gain.value = 0.020;
    const subLfo = AC.createOscillator(), subLfoG = AC.createGain();
    subLfo.type = 'sine'; subLfo.frequency.value = 0.15;
    subLfoG.gain.value = 0.018;
    subLfo.connect(subLfoG); subLfoG.connect(sg.gain);
    sub.connect(sg); sg.connect(ambientGain);
    sub.start(); subLfo.start();
    continuousNodes.push(sub, subLfo);
  }
}

// ── SFX AMBIENTAIS ALEATÓRIOS ─────────────────────────────────
function startEnvSfx(ph, id) {
  if (!AC || ambPhaseId !== id) return;

  function scheduleNext() {
    if (ambPhaseId !== id) return;
    playEnvSfx(ph);
    const delay = ph === 1 ? 2000+Math.random()*4000 :
                  ph === 2 ? 1500+Math.random()*3000 :
                  ph === 3 ? 800+Math.random()*3500 :
                  ph === 4 ? 4000+Math.random()*6000 :
                  ph === 5 ? 1000+Math.random()*2500 :
                  ph === 6 ? 800+Math.random()*2000 :
                  ph === 7 ? 700+Math.random()*1800 :
                  ph === 8 ? 700+Math.random()*1800 :
                             1500+Math.random()*3000;
    sfxTimers.push(setTimeout(() => scheduleNext(), delay));
  }
  sfxTimers.push(setTimeout(() => scheduleNext(), 1500));
}

function playEnvSfx(ph) {
  if (!AC) return;
  const t = AC.currentTime;

  if (ph === 1) {
    // Sons aleatórios: coruja, sapo, galho quebrando
    const r = Math.random();
    if (r < 0.35) {
      // Coruja: dois tons descendentes
      [0, 0.35].forEach((d, i) => {
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(ambientGain);
        if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.6; o.connect(rg); rg.connect(reverbNode); }
        o.type = 'sine'; o.frequency.setValueAtTime(i===0?520:440, t+d);
        o.frequency.exponentialRampToValueAtTime(i===0?480:380, t+d+0.3);
        g.gain.setValueAtTime(0, t+d);
        g.gain.linearRampToValueAtTime(0.06, t+d+0.05);
        g.gain.linearRampToValueAtTime(0.06, t+d+0.2);
        g.gain.linearRampToValueAtTime(0, t+d+0.35);
        o.start(t+d); o.stop(t+d+0.36);
      });
    } else if (r < 0.65) {
      // Sapo: burst rápido
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(ambientGain);
      o.type = 'square';
      o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(120, t+0.15);
      g.gain.setValueAtTime(0.04, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
      o.start(t); o.stop(t+0.2);
    } else {
      // Galho quebrando
      const nb = createNoiseBuffer(0.08, 'white');
      if (nb) {
        const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
        ns.buffer = nb; nf.type = 'highpass'; nf.frequency.value = 3000;
        ns.connect(nf); nf.connect(ng); ng.connect(ambientGain);
        ng.gain.setValueAtTime(0.07, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.06);
        ns.start(t); ns.stop(t+0.08);
      }
    }
  } else if (ph === 2) {
    // Bolhas, baleia, ping de sonar
    const r = Math.random();
    if (r < 0.4) {
      // Bolhas: série de pops agudos
      const count = 3 + Math.floor(Math.random()*5);
      for (let i = 0; i < count; i++) {
        const d = i * (0.06 + Math.random()*0.08);
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(ambientGain);
        o.type = 'sine';
        const f = 800 + Math.random()*1200;
        o.frequency.setValueAtTime(f, t+d);
        o.frequency.exponentialRampToValueAtTime(f*1.8, t+d+0.03);
        g.gain.setValueAtTime(0.035, t+d); g.gain.exponentialRampToValueAtTime(0.001, t+d+0.04);
        o.start(t+d); o.stop(t+d+0.05);
      }
    } else if (r < 0.7) {
      // Canto de baleia: glissando lento
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(ambientGain);
      if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.7; o.connect(rg); rg.connect(reverbNode); }
      o.type = 'sine';
      const baseF = 180 + Math.random()*120;
      o.frequency.setValueAtTime(baseF, t);
      o.frequency.linearRampToValueAtTime(baseF*1.6, t+0.8);
      o.frequency.linearRampToValueAtTime(baseF*0.8, t+2.0);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.04, t+0.3);
      g.gain.linearRampToValueAtTime(0.04, t+1.5);
      g.gain.linearRampToValueAtTime(0, t+2.2);
      o.start(t); o.stop(t+2.3);
    } else {
      // Sonar ping
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(ambientGain);
      if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.8; o.connect(rg); rg.connect(reverbNode); }
      o.type = 'sine'; o.frequency.value = 1200;
      g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t+1.2);
      o.start(t); o.stop(t+1.3);
    }
  } else if (ph === 3) {
    // Trovão, sirene distante, goteiras
    const r = Math.random();
    if (r < 0.3) {
      // Trovão: noise com envelope dramático
      const nb = createNoiseBuffer(2.5, 'brown');
      if (nb) {
        const ns = AC.createBufferSource(), nf = AC.createBiquadFilter(), ng = AC.createGain();
        ns.buffer = nb; nf.type = 'lowpass'; nf.frequency.value = 250;
        ns.connect(nf); nf.connect(ng); ng.connect(ambientGain);
        if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.5; nf.connect(rg); rg.connect(reverbNode); }
        ng.gain.setValueAtTime(0, t);
        ng.gain.linearRampToValueAtTime(0.20, t+0.05);
        ng.gain.linearRampToValueAtTime(0.12, t+0.3);
        ng.gain.linearRampToValueAtTime(0.06, t+1.0);
        ng.gain.exponentialRampToValueAtTime(0.001, t+2.3);
        ns.start(t); ns.stop(t+2.5);
      }
    } else if (r < 0.55) {
      // Sirene distante
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(ambientGain);
      o.type = 'sine';
      const lfo = AC.createOscillator(), lfoG = AC.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 1.5;
      lfoG.gain.value = 80;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      o.frequency.value = 600;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.02, t+0.5);
      g.gain.linearRampToValueAtTime(0.02, t+2.5);
      g.gain.linearRampToValueAtTime(0, t+3.5);
      o.start(t); lfo.start(t);
      o.stop(t+3.6); lfo.stop(t+3.6);
    } else {
      // Goteira: pings metálicos
      const count = 1 + Math.floor(Math.random()*3);
      for (let i = 0; i < count; i++) {
        const d = i * (0.3 + Math.random()*0.5);
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(ambientGain);
        if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.9; o.connect(rg); rg.connect(reverbNode); }
        o.type = 'sine';
        o.frequency.setValueAtTime(2800+Math.random()*800, t+d);
        o.frequency.exponentialRampToValueAtTime(1200, t+d+0.08);
        g.gain.setValueAtTime(0.05, t+d); g.gain.exponentialRampToValueAtTime(0.001, t+d+0.15);
        o.start(t+d); o.stop(t+d+0.16);
      }
    }
  } else if (ph === 4) {
    // Pulsar, interferência de rádio, eco cósmico
    const r = Math.random();
    if (r < 0.35) {
      // Pulsar: beeps rítmicos
      const count = 4 + Math.floor(Math.random()*6);
      const interval = 0.12 + Math.random()*0.08;
      for (let i = 0; i < count; i++) {
        const d = i * interval;
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(ambientGain);
        o.type = 'sine'; o.frequency.value = 1400 + Math.random()*200;
        g.gain.setValueAtTime(0.03, t+d); g.gain.exponentialRampToValueAtTime(0.001, t+d+0.03);
        o.start(t+d); o.stop(t+d+0.04);
      }

  const o2 = AC.createOscillator(), g2 = AC.createGain();
  o2.connect(g2); g2.connect(ambientGain);
  o2.type = 'sine'; o2.frequency.value = freq * 0.5;
  g2.gain.setValueAtTime(0, AC.currentTime);
  g2.gain.linearRampToValueAtTime(0.018, AC.currentTime + 0.7);
  g2.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o2.start(); o2.stop(AC.currentTime + dur);
  if ((ambPhase3.i||0) % 3 === 0) {
    const te = AC.currentTime + 0.05 + Math.random()*0.12;
    const oe = AC.createOscillator(), ge = AC.createGain();
    oe.connect(ge); ge.connect(ambientGain);
    oe.type = 'square'; oe.frequency.value = 600 + Math.random()*600;
    ge.gain.setValueAtTime(0.055, te);
    ge.gain.exponentialRampToValueAtTime(0.0001, te + 0.10);
    oe.start(te); oe.stop(te + 0.11);
  }
  ambPhase3.i = (ambPhase3.i||0) + 1;
  ambTimer = setTimeout(() => ambPhase3(id), 1800 + Math.random() * 2200);
}

function ambPhase4(id) {
  if (!AC || ambPhaseId !== id) return;
  const scale = [65.4, 98.0, 130.8, 146.8, 196.0, 130.8, 98.0, 65.4];
  const freq = scale[(ambPhase4.i||0) % scale.length];
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(ambientGain);
  if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.7; o.connect(rg); rg.connect(reverbNode); }
  o.type = 'sine'; o.frequency.value = freq;
  const dur = 3.8;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(0.026, AC.currentTime + 1.4);
  g.gain.linearRampToValueAtTime(0.026, AC.currentTime + dur - 1.2);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.1);
  const o2 = AC.createOscillator(), g2 = AC.createGain();
  o2.connect(g2); g2.connect(ambientGain);
  o2.type = 'sine'; o2.frequency.value = freq * 1.498;
  g2.gain.setValueAtTime(0, AC.currentTime);
  g2.gain.linearRampToValueAtTime(0.010, AC.currentTime + 1.8);
  g2.gain.linearRampToValueAtTime(0, AC.currentTime + dur * 0.7);
  o2.start(); o2.stop(AC.currentTime + dur);
  if ((ambPhase4.i||0) % 4 === 0) {
    const op = AC.createOscillator(), gp = AC.createGain();
    op.connect(gp); gp.connect(ambientGain);
    op.type = 'sine'; op.frequency.value = 32.7;
    gp.gain.setValueAtTime(0, AC.currentTime);
    gp.gain.linearRampToValueAtTime(0.030, AC.currentTime + 1.5);
    gp.gain.linearRampToValueAtTime(0.030, AC.currentTime + 4.5);
    gp.gain.linearRampToValueAtTime(0, AC.currentTime + 6.0);
    op.start(); op.stop(AC.currentTime + 6.1);
  }
  ambPhase4.i = (ambPhase4.i||0) + 1;
  ambTimer = setTimeout(() => ambPhase4(id), 3200 + Math.random() * 3800);
}

function ambPhase5(id) {
  if (!AC || ambPhaseId !== id) return;
  const scale = [110, 116.5, 130.8, 146.8, 110, 98.0, 110, 123.5];
  const freq = scale[(ambPhase5.i||0) % scale.length];
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(ambientGain);
  o.type = 'sawtooth'; o.frequency.value = freq;
  const dur = 1.1;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(0.030, AC.currentTime + 0.10);
  g.gain.linearRampToValueAtTime(0.030, AC.currentTime + dur - 0.28);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.05);
  const ob = AC.createOscillator(), gb = AC.createGain();
  ob.connect(gb); gb.connect(ambientGain);
  ob.type = 'sine'; ob.frequency.value = 55;
  gb.gain.setValueAtTime(0, AC.currentTime);
  gb.gain.linearRampToValueAtTime(0.040, AC.currentTime + 0.07);
  gb.gain.linearRampToValueAtTime(0.040, AC.currentTime + 0.55);
  gb.gain.linearRampToValueAtTime(0, AC.currentTime + 0.88);
  ob.start(); ob.stop(AC.currentTime + 0.92);
  if ((ambPhase5.i||0) % 2 === 0) {
    const oh = AC.createOscillator(), gh = AC.createGain();
    oh.connect(gh); gh.connect(ambientGain);
    oh.type = 'triangle'; oh.frequency.value = freq * 1.189;
    gh.gain.setValueAtTime(0, AC.currentTime);
    gh.gain.linearRampToValueAtTime(0.018, AC.currentTime + 0.18);
    gh.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
    oh.start(); oh.stop(AC.currentTime + dur + 0.04);
  }
  if ((ambPhase5.i||0) % 4 === 0) {
    const os = AC.createOscillator(), gs = AC.createGain();
    os.connect(gs); gs.connect(ambientGain);
    os.type = 'sine'; os.frequency.value = 27.5;
    gs.gain.setValueAtTime(0, AC.currentTime);
    gs.gain.linearRampToValueAtTime(0.028, AC.currentTime + 0.3);
    gs.gain.linearRampToValueAtTime(0.028, AC.currentTime + 1.8);
    gs.gain.linearRampToValueAtTime(0, AC.currentTime + 2.6);
    os.start(); os.stop(AC.currentTime + 2.7);
  }
  ambPhase5.i = (ambPhase5.i||0) + 1;
  ambTimer = setTimeout(() => ambPhase5(id), 850 + Math.random() * 950);
}

function ambPhase6(id) {
  // Música removida — fase 6 sem som de música
  if (!AC || ambPhaseId !== id) return;
}

function ambPhase7(id) {
  // Música removida — fase 7 sem melodia, apenas ambiente
  if (!AC || ambPhaseId !== id) return;
}

function ambPhase8(id) {
  if (!AC || ambPhaseId !== id) return;
  // Synthwave — escala menor melódica com arpejos
  const scale = [130.8, 146.8, 155.6, 174.6, 196, 220, 233.1, 220];
  const freq = scale[(ambPhase8.i||0) % scale.length];
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(ambientGain);
  if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.7; o.connect(rg); rg.connect(reverbNode); }
  const lp = AC.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 800;
  o.disconnect(); o.connect(lp); lp.connect(g);
  o.type = 'sawtooth'; o.frequency.value = freq;
  const dur = 1.2;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(0.020, AC.currentTime + 0.15);
  g.gain.linearRampToValueAtTime(0.018, AC.currentTime + dur - 0.3);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.1);
  // Oitava acima com delay
  const o2 = AC.createOscillator(), g2 = AC.createGain();
  const lp2 = AC.createBiquadFilter();
  lp2.type = 'lowpass'; lp2.frequency.value = 1200;
  o2.connect(lp2); lp2.connect(g2); g2.connect(ambientGain);
  o2.type = 'square'; o2.frequency.value = freq * 2;
  g2.gain.setValueAtTime(0, AC.currentTime + 0.15);
  g2.gain.linearRampToValueAtTime(0.010, AC.currentTime + 0.3);
  g2.gain.linearRampToValueAtTime(0, AC.currentTime + dur * 0.8);
  o2.start(AC.currentTime + 0.15); o2.stop(AC.currentTime + dur);
  ambPhase8.i = (ambPhase8.i||0) + 1;
  ambTimer = setTimeout(() => ambPhase8(id), 600 + Math.random() * 800);
}

function ambPhase9(id) {
  if (!AC || ambPhaseId !== id) return;
  // Escala menor natural — sombria e orgânica
  const scale = [196, 220, 233.1, 261.6, 293.7, 311.1, 349.2, 311.1];
  const freq = scale[(ambPhase9.i||0) % scale.length];
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(ambientGain);
  if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.85; o.connect(rg); rg.connect(reverbNode); }
  o.type = 'sine'; o.frequency.value = freq;
  const dur = 2.0;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(0.028, AC.currentTime + 0.5);
  g.gain.linearRampToValueAtTime(0.028, AC.currentTime + dur - 0.6);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.1);
  const o2 = AC.createOscillator(), g2 = AC.createGain();
  o2.connect(g2); g2.connect(ambientGain);
  o2.type = 'sine'; o2.frequency.value = freq * 0.25;
  g2.gain.setValueAtTime(0, AC.currentTime);
  g2.gain.linearRampToValueAtTime(0.035, AC.currentTime + 0.3);
  g2.gain.linearRampToValueAtTime(0, AC.currentTime + dur * 0.8);
  o2.start(); o2.stop(AC.currentTime + dur);
  if ((ambPhase9.i||0) % 3 === 0) {
    const od = AC.createOscillator(), gd = AC.createGain();
    od.connect(gd); gd.connect(ambientGain);
    if (reverbNode) { const rg = AC.createGain(); rg.gain.value = 0.6; od.connect(rg); rg.connect(reverbNode); }
    od.type = 'triangle'; od.frequency.value = freq * 1.059;
    gd.gain.setValueAtTime(0, AC.currentTime);
    gd.gain.linearRampToValueAtTime(0.014, AC.currentTime + 0.7);
    gd.gain.linearRampToValueAtTime(0, AC.currentTime + dur * 0.6);
    od.start(); od.stop(AC.currentTime + dur);
  }
  ambPhase9.i = (ambPhase9.i||0) + 1;
  ambTimer = setTimeout(() => ambPhase9(id), 1800 + Math.random() * 2500);
}

// ── TELA DE INÍCIO ────────────────────────────────────────────
function drawStartScreen() {
  // Overlay escuro
  ctx.fillStyle = 'rgba(0,8,15,0.70)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';

  // Título
  ctx.fillStyle = 'rgba(0,235,205,0.92)';
  ctx.font = 'bold 34px Georgia';
  ctx.letterSpacing = '8px';
  ctx.fillText('VAGALUME NO ESCURO', W/2, H/2 - 60);

  // Linha decorativa
  ctx.strokeStyle = 'rgba(0,180,160,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2 - 190, H/2 - 38); ctx.lineTo(W/2 + 190, H/2 - 38); ctx.stroke();

  // Instrução pulsante
  const pulse = 0.65 + Math.sin(tick * 0.055) * 0.35;
  ctx.fillStyle = `rgba(0,220,190,${pulse})`;
  ctx.font = '13px Georgia';
  ctx.letterSpacing = '4px';
  ctx.fillText('✦  CLIQUE OU PRESSIONE QUALQUER TECLA  ✦', W/2, H/2 + 2);

  // Controles
  ctx.fillStyle = 'rgba(0,150,130,0.50)';
  ctx.font = '11px Georgia';
  ctx.letterSpacing = '2px';
  ctx.fillText('← → MOVER  ·  SHIFT VOAR RÁPIDO  ·  ELE BATE ASAS SOZINHO!', W/2, H/2 + 36);

  ctx.textAlign = 'left';
  ctx.restore();
}

// ── EFEITOS VISUAIS NOVOS ─────────────────────────────────────

function updateShake() {
  if (shakeIntensity > 0.3) {
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.88;
  } else {
    shakeX = 0; shakeY = 0; shakeIntensity = 0;
  }
}

function drawChromaticAberration() {
  if (chromaticAlpha <= 0.01) return;
  const offset = chromaticAlpha * 6;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = chromaticAlpha * 0.35;
  // Red channel shift
  ctx.drawImage(canvas, offset, 0, W, H, 0, 0, W, H);
  // Blue channel shift
  ctx.drawImage(canvas, -offset, 0, W, H, 0, 0, W, H);
  ctx.restore();
  chromaticAlpha *= 0.92;
  if (chromaticAlpha < 0.01) chromaticAlpha = 0;
}

function updateSpeedLines() {
  const isShift = keys['ShiftLeft'] || keys['ShiftRight'];
  const isMoving = keys['ArrowLeft'] || keys['ArrowRight'] || keys['KeyA'] || keys['KeyD'];
  if (isShift && isMoving && gameStarted && !gameFinished) {
    for (let i = 0; i < 2; i++) {
      speedLineParticles.push({
        x: player.x + (Math.random() - 0.5) * 60,
        y: player.y - 20 + Math.random() * 80,
        vx: -player.facing * (8 + Math.random() * 12),
        life: 1,
        len: 20 + Math.random() * 40
      });
    }
  }
  for (let i = speedLineParticles.length - 1; i >= 0; i--) {
    const sl = speedLineParticles[i];
    sl.x += sl.vx;
    sl.life -= 0.06;
    if (sl.life <= 0) speedLineParticles.splice(i, 1);
  }
}

function drawSpeedLines() {
  if (speedLineParticles.length === 0) return;
  const phase = getPhase();
  const colors = ['rgba(0,220,200,','rgba(60,180,255,','rgba(160,80,255,','rgba(120,180,255,','rgba(255,120,40,','rgba(180,60,255,','rgba(200,20,30,','rgba(180,40,255,'];
  const col = colors[Math.min(phase-1, 7)];
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (const sl of speedLineParticles) {
    const sx = sl.x - camX;
    if (sx < -50 || sx > W + 50) continue;
    ctx.globalAlpha = sl.life * 0.4;
    ctx.strokeStyle = col + (sl.life * 0.6) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sl.y);
    ctx.lineTo(sx + sl.len * (sl.vx > 0 ? 1 : -1), sl.y);
    ctx.stroke();
  }
  ctx.restore();
}

function updateTrail() {
  if (!gameStarted || gameFinished) return;
  trailPositions.unshift({ x: player.x + player.w/2, y: player.y + player.h/2, phase: getPhase() });
  if (trailPositions.length > 18) trailPositions.pop();
}

function drawTrail() {
  if (trailPositions.length < 2) return;
  const trailColors = [
    [0, 200, 180],
    [255, 160, 40],
    [100, 220, 50],
    [100, 160, 255],
    [255, 80, 20],
    [180, 50, 220],
    [200, 20, 30],
    [180, 40, 255]
  ];
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 1; i < trailPositions.length; i++) {
    const t = trailPositions[i];
    const alpha = (1 - i / trailPositions.length) * 0.25;
    const [r,g,b] = trailColors[Math.min(t.phase-1, 7)];
    const sx = t.x - camX;
    if (sx < -20 || sx > W + 20) continue;
    ctx.globalAlpha = alpha;
    const radius = (1 - i / trailPositions.length) * 8;
    const grad = ctx.createRadialGradient(sx, t.y, 0, sx, t.y, radius);
    grad.addColorStop(0, `rgba(${r},${g},${b},${alpha})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(sx, t.y, radius, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawPhaseFlash() {
  if (phaseFlashAlpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = phaseFlashAlpha;
  ctx.fillStyle = phaseFlashColor;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  phaseFlashAlpha *= 0.90;
}

// ── LOOP ─────────────────────────────────────────────────────
function loop() {
  tick++;
  const newPhase = getPhase();
  if (newPhase !== currentPhase) {
    currentPhase = newPhase; phaseNotifAlpha = 2.2;
    phaseFlashAlpha = newPhase >= 6 ? 1.0 : 0.6;
    phaseFlashColor = ['#00e8c8','#ffb030','#b060ff','#88aaff','#ff4020','#a020e0','#cc0015','#b428ff','#1aff3a'][Math.min(newPhase-1, 8)];
    shakeIntensity = newPhase >= 6 ? 20 : 8;
    chromaticAlpha = newPhase >= 6 ? 0.8 : 0;
    sfxPhaseChange(newPhase); startAmbient(newPhase);
  }
  if (gameStarted && !gameFinished) {
    updatePhysics(); updateParticles();
    updateSpeedLines(); updateTrail();
  }
  updateBgDust(); updateCamera(); updateShake();

  // Aplica screen shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBG(); drawPlatforms();
  drawTrail(); // Trail atrás do player
  drawPlayer();
  // for (const p of particles) p.draw(camX); // removido - bolinhas verdes
  drawSpeedLines(); // Speed lines
  drawDustParticles();
  // drawLandingEffects(); // removido
  drawPhaseFlash(); // Flash de transição de fase
  if (!gameStarted) { drawStartScreen(); } else { drawHUD(); }

  ctx.restore(); // Remove shake

  drawChromaticAberration(); // Aberração cromática (pós-processamento)

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
