// ── PARTÍCULAS ───────────────────────────────────────────────
class Particle {
  constructor(x, y) { this.reset(x, y); }
  reset(x, y) {
    this.x = x + (Math.random()-0.5)*4;
    this.y = y;
    this.vx = (Math.random()-0.5)*0.6;
    this.vy = -(0.4 + Math.random()*0.8);
    this.life = 1;
    this.decay = 0.018 + Math.random()*0.025;
    this.size = 1.5 + Math.random()*2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy *= 0.98;
    this.vx += (Math.random()-0.5)*0.15;
    this.life -= this.decay;
  }
  draw(ox) {
    ctx.save();
    ctx.globalAlpha = this.life * 0.9;
    const t = 1 - this.life;
    const g = ctx.createRadialGradient(this.x-ox, this.y, 0, this.x-ox, this.y, this.size);
    g.addColorStop(0, `rgb(${Math.floor(200-t*100)},255,${Math.floor(60-t*60)})`);
    g.addColorStop(1, 'rgba(50,200,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(this.x-ox, this.y, this.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

const player = {
  x: 80, y: 380,
  w: 22, h: 44,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1,
  walkFrame: 0,
  flickerPhase: 0,
};

const particles = Array.from({length: 14}, () => new Particle(player.x + player.w/2, player.y + player.h - 8));
let camX = 0;
let flashAlpha = 0;
let currentPhase = 1;
let phaseNotifAlpha = 0;

let jumpCount = 0;
let gameFinished = false;

// ── NOVOS EFEITOS VISUAIS ────────────────────────────────────
let shakeX = 0, shakeY = 0, shakeIntensity = 0;
let chromaticAlpha = 0;
let speedLineParticles = [];
let trailPositions = [];
let phaseFlashAlpha = 0, phaseFlashColor = '#00e8c8';

function getPhase() {
  if (player.x >= 71540) return 10;
  if (player.x >= 61540) return 9;
  if (player.x >= 51540) return 8;
  if (player.x >= 41540) return 7;
  if (player.x >= 32540) return 6;
  if (player.x >= 23000) return 5;
  if (player.x >= 15000) return 4;
  if (player.x >= 10000) return 3;
  if (player.x >= 5000) return 2;
  return 1;
}

// ── FÍSICA ───────────────────────────────────────────────────
function updatePhysics() {
  const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 5.5 : 3.0;
  let moving = false;

  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx = -speed; player.facing = -1; moving = true;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx = speed;  player.facing =  1; moving = true;
  } else {
    player.vx *= 0.75;
  }

  if (moving && player.onGround) player.walkFrame++;

  player.vy += 0.55;
  if (player.vy > 18) player.vy = 18;
  player.x += player.vx;
  player.y += player.vy;

  if (player.x < 0) player.x = 0;
  if (player.x > WORLD_W - player.w) player.x = WORLD_W - player.w;

  // Plataformas móveis (Fase 5) — atualiza posições antes da colisão
  for (const p of platforms) {
    if (p.mvx !== undefined) {
      if (p._bx === undefined) p._bx = p.x;
      p.x += p.mvx;
      if (Math.abs(p.x - p._bx) > p.mvr) p.mvx = -p.mvx;
    }
  }

  // Colisão — ÚNICA MUDANÇA: pula automaticamente ao tocar
  player.onGround = false;
  for (const p of platforms) {
    // Fase 5: margem mais leve para manter realismo sem tornar os buracos impossíveis
    const phase5 = getPhase() === 5;
    const margin = phase5 ? player.w * 0.12 : 0;
    const inX = player.x + player.w - margin > p.x && player.x + margin < p.x + p.w;
    const wasAbove = (player.y + player.h - player.vy) <= p.y + 4;
    if (inX && wasAbove && player.y + player.h >= p.y && player.y + player.h <= p.y + 20 && player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = -12.5;   // ← auto-pulo
      player.onGround = true;
      jumpCount++;
      if (p.type !== 'ground') shakeIntensity = Math.max(shakeIntensity, 3); // Mini shake ao pousar em plataformas
      // Poeira ao pousar
      for (let i = 0; i < 6; i++) {
        dustParticles.push({
          x: player.x + player.w/2 + (Math.random()-0.5)*16,
          y: player.y + player.h,
          vx: (Math.random()-0.5)*2.5,
          vy: -Math.random()*1.8 - 0.5,
          life: 1,
          size: Math.random()*3 + 1.5,
        });
      }
      sfxJump(); sfxLand();
      break;
    }
    // Bate no teto
    if (inX && player.y < p.y + p.h && player.y > p.y - 10 && player.vy < 0) {
      player.vy = 0; player.y = p.y + p.h;
    }
  }

  // Caiu no buraco → reseta com efeitos visuais
  if (player.y > H + 100) {
    flashAlpha = 0.9;
    shakeIntensity = 18; // SCREEN SHAKE na morte
    chromaticAlpha = 1.0; // ABERRAÇÃO CROMÁTICA na morte
    sfxDeath();
    const ph3 = getPhase(); const spawnX = ph3===10 ? 71640 : ph3===9 ? 61640 : ph3===8 ? 51640 : ph3===7 ? 41640 : ph3===6 ? 32640 : ph3===5 ? 23100 : ph3===4 ? 15100 : ph3===3 ? 10100 : ph3===2 ? 5100 : 80;
    player.x = spawnX; player.y = 380; player.vx = 0; player.vy = 0;
    trailPositions = []; // Limpa trail
  }
}

function updateCamera() {
  const target = player.x - W/2 + player.w/2;
  camX += (target - camX) * 0.1;
  if (camX < 0) camX = 0;
  if (camX > WORLD_W - W) camX = WORLD_W - W;
}

function updateParticles() {
  const cx = player.x + player.w/2;
  const cy = player.y + player.h - 8;
  for (const p of particles) {
    p.update();
    if (p.life <= 0) p.reset(cx, cy);
  }
}

function updateBgDust() {
  for (const d of bgDust) {
    d.x += d.vx; d.y += d.vy;
    if (d.y < -5)  { d.y = H + 5;  d.x = camX + Math.random()*W; }
    if (d.x < camX - 200) d.x = camX + W + 50;
    if (d.x > camX + W + 200) d.x = camX - 50;
  }
}

// ── DESENHO ──────────────────────────────────────────────────
function drawBG() {
  function mtn(wx0,yBase,sc,fr,col,alp) {
    ctx.save(); ctx.globalAlpha=alp; ctx.fillStyle=col; ctx.beginPath();
    const steps=Math.ceil(W/4)+2; ctx.moveTo(0,H);
    for (let i=0; i<=steps; i++) {
      const sx=i*(W/steps), wx=(wx0+sx)*sc+T*fr;
      const y=yBase+Math.sin(wx*0.73)*48*sc+Math.sin(wx*1.31)*28*sc+Math.sin(wx*2.57)*14*sc+Math.sin(wx*0.18)*72*sc;
      ctx.lineTo(sx,y);
    }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); ctx.restore();
  }
  function drawTree(tx, baseY, height, trunkW, leafR, trunkCol, leafCol, leafCol2) {
    ctx.fillStyle = trunkCol;
    ctx.fillRect(tx - trunkW/2, baseY - height, trunkW, height);
    // Raízes visíveis
    for (let r = -1; r <= 1; r += 2) {
      ctx.beginPath();
      ctx.moveTo(tx, baseY);
      ctx.quadraticCurveTo(tx + r * trunkW * 1.5, baseY + 4, tx + r * trunkW * 2.5, baseY + 8);
      ctx.lineWidth = trunkW * 0.4;
      ctx.strokeStyle = trunkCol;
      ctx.stroke();
    }
    // Copa com múltiplas camadas
    for (let layer = 0; layer < 3; layer++) {
      const lr = leafR * (1 - layer * 0.22);
      const ly = baseY - height - layer * leafR * 0.3;
      const lx = tx + (layer - 1) * leafR * 0.15;
      ctx.fillStyle = layer === 0 ? leafCol : leafCol2;
      ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI * 2); ctx.fill();
    }
  }
  const rawPh = getPhase();
  const phase = rawPh;
  const T = tick * 0.018;

  // ===============================================================
  //  FASE 1 — Floresta Densa Noturna (Realista)
  // ===============================================================
  if (phase === 1) {
    // Céu noturno com gradiente realista
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#020812'); sky.addColorStop(0.3,'#0a1628'); sky.addColorStop(0.6,'#0f1f2e'); sky.addColorStop(1,'#0c1a15');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Estrelas realistas com cores variadas
    for (let i=0; i<180; i++) {
      const sx=d_s(i*31)*W, sy=d_s(i*31+1)*H*0.55;
      const sa=0.3+0.5*d_s(i*31+2)+0.2*Math.sin(T*0.8+i*0.7);
      const starHue = [220,40,200,0,180][i%5];
      const starSize = d_s(i*31+3)*1.4+0.3;
      ctx.globalAlpha=sa;
      ctx.fillStyle=`hsl(${starHue},${starSize>1?60:20}%,${85+d_s(i*31+4)*15}%)`;
      ctx.beginPath(); ctx.arc(sx,sy,starSize,0,Math.PI*2); ctx.fill();
      // Cruz de difração nas maiores
      if (starSize > 1.2) {
        ctx.globalAlpha = sa * 0.3;
        ctx.fillRect(sx-4, sy-0.3, 8, 0.6);
        ctx.fillRect(sx-0.3, sy-4, 0.6, 8);
      }
    }
    ctx.globalAlpha=1;

    // Lua crescente detalhada
    const moonX=W*0.82+(-camX)*0.005, moonY=H*0.14;
    // Halo atmosférico
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (let h=0; h<3; h++) {
      const mHalo=ctx.createRadialGradient(moonX,moonY,8+h*5,moonX,moonY,60+h*40);
      mHalo.addColorStop(0,`rgba(200,210,180,${0.12-h*0.03})`); mHalo.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=mHalo; ctx.beginPath(); ctx.arc(moonX,moonY,60+h*40,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // Lua com textura
    ctx.fillStyle='#e8e0c8'; ctx.beginPath(); ctx.arc(moonX,moonY,18,0,Math.PI*2); ctx.fill();
    // Crateras sutis
    ctx.fillStyle='rgba(180,170,140,0.4)';
    ctx.beginPath(); ctx.arc(moonX-5,moonY-3,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX+4,moonY+5,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX-2,moonY+7,2.5,0,Math.PI*2); ctx.fill();
    // Sombra crescente
    ctx.fillStyle='#0a1628'; ctx.beginPath(); ctx.arc(moonX+8,moonY-2,15,0,Math.PI*2); ctx.fill();

    // Nuvens finas realistas
    ctx.save();
    for (let i=0; i<6; i++) {
      const csx=((d_s(i*19)*3000+(-camX)*0.008+T*6)%3000)-600;
      if (csx<-300||csx>W+300) continue;
      const csy=30+d_s(i*19+1)*60;
      ctx.globalAlpha=0.08+d_s(i*19+2)*0.06;
      const cw = 200+d_s(i*19+3)*200;
      const cg=ctx.createRadialGradient(csx,csy,0,csx,csy,cw*0.3);
      cg.addColorStop(0,'rgba(60,70,90,1)'); cg.addColorStop(1,'rgba(20,30,50,0)');
      ctx.fillStyle=cg;
      ctx.beginPath(); ctx.ellipse(csx,csy,cw*0.5,20+d_s(i*19+4)*15,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Montanhas distantes com neve nos picos
    const off1=(-camX)*0.015;
    mtn(off1, H*0.42, 0.00010, 0, '#0a1520', 0.95);
    // Neve nos picos
    ctx.save(); ctx.globalAlpha=0.15;
    const steps1=Math.ceil(W/4)+2;
    ctx.fillStyle='#8090a0';
    ctx.beginPath(); ctx.moveTo(0,H);
    for (let i=0; i<=steps1; i++) {
      const sx=i*(W/steps1), wx=(off1+sx)*0.00010;
      const y=H*0.42+Math.sin(wx*0.73)*48*0.00010+Math.sin(wx*1.31)*28*0.00010+Math.sin(wx*2.57)*14*0.00010+Math.sin(wx*0.18)*72*0.00010;
      ctx.lineTo(sx,y-3);
    }
    for (let i=steps1; i>=0; i--) {
      const sx=i*(W/steps1), wx=(off1+sx)*0.00010;
      const y=H*0.42+Math.sin(wx*0.73)*48*0.00010+Math.sin(wx*1.31)*28*0.00010+Math.sin(wx*2.57)*14*0.00010+Math.sin(wx*0.18)*72*0.00010;
      ctx.lineTo(sx,y+8);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();

    mtn(off1*1.6, H*0.50, 0.00015, 0, '#0d1c28', 0.90);

    // Floresta densa camada traseira
    const off2=(-camX)*0.035;
    for (let i=0; i<30; i++) {
      const tx=((d_s(i*41)*28000+off2)%28000)/28000*W;
      if (tx<-40||tx>W+40) continue;
      const th=50+d_s(i*41+1)*70;
      const shade = 8+d_s(i*41+2)*8;
      drawTree(tx, H*0.82, th, 4, 18+d_s(i*41+3)*12,
        `rgb(${shade},${shade+5},${shade})`,
        `rgb(${shade+3},${shade+12},${shade+2})`,
        `rgb(${shade+1},${shade+8},${shade})`);
    }

    // Floresta média
    const off3=(-camX)*0.06;
    for (let i=0; i<20; i++) {
      const tx=((d_s(i*47)*28000+off3)%28000)/28000*W;
      if (tx<-50||tx>W+50) continue;
      const th=70+d_s(i*47+1)*90;
      const shade = 5+d_s(i*47+2)*6;
      // Pinheiros (triângulos empilhados)
      ctx.fillStyle=`rgb(${shade},${shade+3},${shade})`;
      ctx.fillRect(tx-3, H*0.86-th, 6, th);
      for (let layer=0; layer<4; layer++) {
        const ly = H*0.86 - th + layer*(th*0.22);
        const lw = 12 + layer*8 + d_s(i*47+layer)*6;
        ctx.beginPath(); ctx.moveTo(tx-lw, ly+th*0.28); ctx.lineTo(tx, ly); ctx.lineTo(tx+lw, ly+th*0.28); ctx.closePath(); ctx.fill();
      }
    }

    // Névoa rasteira com camadas
    for (let f=0; f<3; f++) {
      const fogY = H*0.72 + f*H*0.06;
      const fogA = 0.08 - f*0.02;
      ctx.save(); ctx.globalAlpha = fogA + 0.03*Math.sin(T*0.3+f);
      const fog=ctx.createLinearGradient(0,fogY,0,fogY+H*0.12);
      fog.addColorStop(0,'rgba(0,0,0,0)'); fog.addColorStop(0.5,'rgba(30,45,40,1)'); fog.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=fog; ctx.fillRect(0,fogY,W,H*0.12);
      ctx.restore();
    }

    // Vagalumes ambiente removidos

    // Solo/chão de floresta
    const ground=ctx.createLinearGradient(0,H*0.84,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(10,18,12,0.9)'); ground.addColorStop(1,'rgba(8,14,10,0.95)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.84,W,H*0.16);
  }

  // ===============================================================
  //  FASE 2 — Oceano Profundo (Realista)
  // ===============================================================
  else if (phase === 2) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#001420'); sky.addColorStop(0.2,'#002038'); sky.addColorStop(0.5,'#003050'); sky.addColorStop(0.8,'#002040'); sky.addColorStop(1,'#001830');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Raios de luz cáustica (ondulantes)
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (let i=0; i<12; i++) {
      const rx=W*0.05+i*(W*0.082)+Math.sin(T*0.3+i*0.8)*30+Math.cos(T*0.5+i*1.2)*15;
      const rw=18+Math.sin(T*0.4+i*1.5)*8;
      const ra=0.04+0.03*Math.sin(T*0.5+i*1.1);
      ctx.fillStyle=`rgba(40,160,200,${ra})`;
      ctx.beginPath();
      ctx.moveTo(rx-rw,0); ctx.lineTo(rx+rw,0);
      ctx.lineTo(rx+rw*1.8+Math.sin(T*0.2+i)*20,H);
      ctx.lineTo(rx-rw*0.2+Math.sin(T*0.3+i+1)*20,H);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // Parede de rocha submarina (parallax distante)
    const off1=(-camX)*0.012;
    ctx.fillStyle='#0a1e28';
    const rockSteps=60;
    ctx.beginPath(); ctx.moveTo(0,H);
    for (let i=0; i<=rockSteps; i++) {
      const sx=i*(W/rockSteps), wx=(off1+sx)*0.003;
      const y=H*0.40+Math.sin(wx*2.1)*30+Math.sin(wx*5.3)*15+Math.cos(wx*0.7)*45;
      ctx.lineTo(sx,y);
    }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
    // Textura de rocha
    ctx.save(); ctx.globalAlpha=0.15;
    for (let i=0; i<40; i++) {
      const rx=d_s(i*37)*W, ry=H*0.45+d_s(i*37+1)*H*0.3;
      ctx.fillStyle=d_s(i*37+2)>0.5?'#0e2430':'#061820';
      ctx.beginPath(); ctx.ellipse(rx,ry,8+d_s(i*37+3)*20,4+d_s(i*37+4)*8,d_s(i*37+5)*3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Corais realistas
    const off2=(-camX)*0.06;
    for (let i=0; i<16; i++) {
      const cx=((d_s(i*29)*28000+off2)%28000)/28000*W;
      if (cx<-30||cx>W+30) continue;
      const ch=35+d_s(i*29+1)*55;
      const coralHue=[350,20,310,5,340][i%5];
      const coralSat=55+d_s(i*29+2)*25;
      const coralLight=28+d_s(i*29+3)*15;
      ctx.fillStyle=`hsl(${coralHue},${coralSat}%,${coralLight}%)`;
      // Coral ramificado
      for (let b=0; b<5+Math.floor(d_s(i*29+4)*4); b++) {
        const bAngle = -Math.PI/2 + (b-2)*0.35 + Math.sin(T*0.3+i)*0.05;
        const bLen = ch*(0.4+d_s(i*29+b+5)*0.6);
        const bx2 = cx + Math.cos(bAngle)*bLen;
        const by2 = H + Math.sin(bAngle)*bLen;
        ctx.lineWidth = 3+d_s(i*29+b+10)*3;
        ctx.strokeStyle=`hsl(${coralHue},${coralSat}%,${coralLight+5}%)`;
        ctx.beginPath(); ctx.moveTo(cx, H);
        ctx.quadraticCurveTo(cx+(bx2-cx)*0.5+d_s(i*29+b+15)*10, (H+by2)*0.5-5, bx2, by2);
        ctx.stroke();
        // Pontas
        ctx.fillStyle=`hsl(${coralHue},${coralSat+10}%,${coralLight+12}%)`;
        ctx.beginPath(); ctx.arc(bx2,by2,2+d_s(i*29+b+20)*2,0,Math.PI*2); ctx.fill();
      }
    }

    // Algas ondulantes realistas
    const off3=(-camX)*0.075;
    for (let i=0; i<22; i++) {
      const kx=((d_s(i*53)*28000+off3)%28000)/28000*W;
      if (kx<-5||kx>W+5) continue;
      const kh=60+d_s(i*53+1)*90;
      const kHue = 100+d_s(i*53+2)*40;
      ctx.strokeStyle=`hsla(${kHue},60%,25%,0.85)`;
      ctx.lineWidth=2+d_s(i*53+3)*2;
      ctx.beginPath(); ctx.moveTo(kx,H);
      const segments=8;
      for (let s=1; s<=segments; s++) {
        const ky=H-kh*s/segments;
        const sway=Math.sin(T*0.7+i*1.4+s*0.5)*12*(s/segments);
        ctx.quadraticCurveTo(kx+sway*1.3,ky+kh/segments*0.5,kx+sway,ky);
      }
      ctx.stroke();
      // Folhas laterais
      for (let l=1; l<4; l++) {
        const ly = H - kh*l/4;
        const lsway = Math.sin(T*0.7+i*1.4+l*0.5)*12*(l/4);
        ctx.fillStyle=`hsla(${kHue},55%,22%,0.7)`;
        ctx.beginPath();
        ctx.ellipse(kx+lsway+(l%2?8:-8), ly, 6, 2, (l%2?0.3:-0.3), 0, Math.PI*2);
        ctx.fill();
      }
    }

    // Peixes pequenos em cardume
    ctx.save();
    for (let school=0; school<3; school++) {
      const sx0 = (d_s(school*99)*W*2 + T*30*(1+school*0.4))%(W*2) - W*0.3;
      const sy0 = H*0.25+d_s(school*99+1)*H*0.35;
      const fishCol = [`rgba(180,200,220,0.5)`,`rgba(120,180,200,0.4)`,`rgba(200,180,140,0.45)`][school];
      ctx.fillStyle = fishCol;
      for (let f=0; f<8+school*3; f++) {
        const fx = sx0 + d_s(school*99+f*3+2)*60 + Math.sin(T*2+f)*5;
        const fy = sy0 + d_s(school*99+f*3+3)*30 + Math.cos(T*1.5+f*0.8)*4;
        if (fx<-10||fx>W+10) continue;
        ctx.beginPath();
        ctx.moveTo(fx+6,fy); ctx.lineTo(fx-4,fy-2); ctx.lineTo(fx-4,fy+2); ctx.closePath(); ctx.fill();
        // Cauda
        ctx.beginPath(); ctx.moveTo(fx-4,fy); ctx.lineTo(fx-8,fy-2.5); ctx.lineTo(fx-8,fy+2.5); ctx.closePath(); ctx.fill();
      }
    }
    ctx.restore();

    // Bolhas realistas
    for (let i=0; i<35; i++) {
      const bphase=(T*0.5+d_s(i*17)*12)%12;
      const bx=d_s(i*17+1)*W+Math.sin(T*0.7+i)*10+Math.cos(T*1.1+i*0.7)*5;
      const by=H-(bphase/12)*H*1.15;
      if (by<-10||by>H+10) continue;
      const br=1.5+d_s(i*17+2)*4;
      ctx.save();
      ctx.globalAlpha=0.3+d_s(i*17+3)*0.25;
      // Borda
      ctx.strokeStyle='rgba(120,200,230,0.6)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.stroke();
      // Reflexo especular
      ctx.fillStyle='rgba(200,240,255,0.5)';
      ctx.beginPath(); ctx.arc(bx-br*0.3,by-br*0.3,br*0.25,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Partículas de sedimento
    for (let i=0; i<20; i++) {
      const px2=d_s(i*71)*W, py2=d_s(i*71+1)*H;
      const pa = 0.1+0.08*Math.sin(T*0.4+i*1.7);
      ctx.fillStyle=`rgba(100,140,160,${pa})`;
      ctx.beginPath(); ctx.arc(px2+Math.sin(T*0.2+i)*3, py2, 0.8+d_s(i*71+2)*1.2, 0, Math.PI*2); ctx.fill();
    }
  }

  // ===============================================================
  //  FASE 3 — Cidade na Tempestade (Realista)
  // ===============================================================
  else if (phase === 3) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#080c14'); sky.addColorStop(0.35,'#101822'); sky.addColorStop(0.65,'#18222e'); sky.addColorStop(0.85,'#1a2428'); sky.addColorStop(1,'#141c1a');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Nuvens de tempestade realistas (volumétricas)
    for (let layer=0; layer<2; layer++) {
      ctx.save();
      for (let i=0; i<12; i++) {
        const csx=(d_s(i*23+layer*50)*W*3+T*(8+layer*4)*(1+d_s(i*23+1)*0.5))%(W*3)-W*0.5;
        if (csx<-250||csx>W+250) continue;
        const csy=10+layer*30+d_s(i*23+2+layer)*60;
        const cw=120+d_s(i*23+3)*100;
        const ch2=30+d_s(i*23+4)*25;
        ctx.globalAlpha=0.3-layer*0.1;
        // Múltiplos blobs por nuvem
        for (let b=0; b<4; b++) {
          const bx2=csx+d_s(i*23+b+5)*cw-cw*0.5;
          const by2=csy+d_s(i*23+b+9)*ch2*0.5;
          const br=25+d_s(i*23+b+13)*30;
          const cg=ctx.createRadialGradient(bx2,by2,br*0.1,bx2,by2,br);
          cg.addColorStop(0,`rgba(20,25,35,0.8)`); cg.addColorStop(1,'rgba(12,16,24,0)');
          ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx2,by2,br,0,Math.PI*2); ctx.fill();
        }
      }
      ctx.restore();
    }

    // Reflexo de poluição luminosa no horizonte
    const hGlow=ctx.createLinearGradient(0,H*0.50,0,H*0.70);
    hGlow.addColorStop(0,'rgba(255,140,30,0.12)'); hGlow.addColorStop(0.5,'rgba(255,100,20,0.06)'); hGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hGlow; ctx.fillRect(0,H*0.50,W,H*0.20);

    // Skyline distante detalhado
    const off1=(-camX)*0.018;
    ctx.fillStyle='#0c1420';
    for (let i=0; i<35; i++) {
      const bx=((d_s(i*37)*28000+off1)%28000)/28000*W;
      if (bx<-30||bx>W+30) continue;
      const bw=10+d_s(i*37+1)*28;
      const bh=25+d_s(i*37+2)*80;
      const by2=H*0.60-bh;
      ctx.fillRect(bx-bw/2,by2,bw,bh+H*0.40);
      // Antena no topo de alguns
      if (d_s(i*37+3)>0.7) {
        ctx.fillRect(bx-1, by2-12-d_s(i*37+4)*20, 2, 12+d_s(i*37+4)*20);
        // Luz vermelha piscante
        if (Math.sin(T*2+i)>0.3) {
          ctx.save(); ctx.globalCompositeOperation='screen';
          ctx.fillStyle='rgba(255,20,20,0.8)';
          ctx.beginPath(); ctx.arc(bx, by2-12-d_s(i*37+4)*20, 2, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }
    }

    // Edifícios médios com janelas
    const off2=(-camX)*0.05;
    for (let i=0; i<20; i++) {
      const bx=((d_s(i*43)*28000+off2)%28000)/28000*W;
      if (bx<-50||bx>W+50) continue;
      const bw=20+d_s(i*43+1)*35, bh=50+d_s(i*43+2)*110;
      const by2=H*0.78-bh;
      // Corpo do edifício
      ctx.fillStyle=`rgb(${12+d_s(i*43+3)*8|0},${16+d_s(i*43+4)*8|0},${22+d_s(i*43+5)*8|0})`;
      ctx.fillRect(bx-bw/2,by2,bw,bh+H*0.22);
      // Janelas em grade
      const winW=4, winH=5, winGapX=8, winGapY=10;
      const cols=Math.floor((bw-6)/winGapX);
      const rows=Math.floor((bh-8)/winGapY);
      for (let wr=0; wr<rows; wr++) {
        for (let wc=0; wc<cols; wc++) {
          const wx2=bx-bw/2+4+wc*winGapX;
          const wy2=by2+6+wr*winGapY;
          const lit = d_s(i*43+wr*10+wc+5) > 0.55;
          if (lit) {
            // Luz amarela/branca da janela
            const warmth = d_s(i*43+wr+wc+20);
            ctx.fillStyle=`rgba(255,${200+warmth*55|0},${120+warmth*80|0},${0.5+warmth*0.3})`;
            ctx.fillRect(wx2,wy2,winW,winH);
            // Glow
            ctx.save(); ctx.globalCompositeOperation='screen';
            const wg=ctx.createRadialGradient(wx2+winW/2,wy2+winH/2,0,wx2+winW/2,wy2+winH/2,10);
            wg.addColorStop(0,`rgba(255,${210+warmth*40|0},${100+warmth*60|0},0.12)`);
            wg.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=wg; ctx.fillRect(wx2-6,wy2-6,winW+12,winH+12);
            ctx.restore();
          } else {
            ctx.fillStyle='rgba(20,25,35,0.8)';
            ctx.fillRect(wx2,wy2,winW,winH);
          }
        }
      }
    }

    // Postes de luz
    const off5=(-camX)*0.09;
    for (let i=0; i<8; i++) {
      const lx=((d_s(i*61)*28000+off5)%28000)/28000*W;
      if (lx<-20||lx>W+20) continue;
      ctx.fillStyle='#1a1e24';
      ctx.fillRect(lx-2,H*0.78,4,H*0.22);
      ctx.fillRect(lx-8,H*0.78,16,3);
      // Luz do poste
      ctx.save(); ctx.globalCompositeOperation='screen';
      const lg=ctx.createRadialGradient(lx,H*0.79,0,lx,H*0.79,50);
      lg.addColorStop(0,'rgba(255,200,100,0.25)'); lg.addColorStop(0.5,'rgba(255,160,60,0.08)'); lg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,H*0.79,50,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Chuva diagonal realista
    ctx.save();
    for (let i=0; i<120; i++) {
      const rx=((d_s(i*11)*W*1.5+T*140)%(W*1.5))-W*0.25;
      const ry=((d_s(i*11+1)*H*1.5+T*220)%(H*1.5))-H*0.25;
      const rlen=8+d_s(i*11+2)*10;
      ctx.globalAlpha=0.15+d_s(i*11+3)*0.2;
      ctx.strokeStyle='rgba(180,210,240,0.7)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+4,ry+rlen); ctx.stroke();
    }
    ctx.restore();

    // Relâmpago realista
    if (Math.sin(T*3.1)*Math.sin(T*7.3)>0.84) {
      ctx.save(); ctx.globalCompositeOperation='screen';
      // Flash no céu
      ctx.fillStyle='rgba(200,220,255,0.08)'; ctx.fillRect(0,0,W,H);
      // Raio com ramificações
      let lx=W*0.25+Math.sin(T*5)*W*0.5, ly=0;
      ctx.strokeStyle='rgba(220,240,255,0.9)'; ctx.lineWidth=2.5;
      ctx.shadowColor='rgba(150,200,255,0.8)'; ctx.shadowBlur=15;
      ctx.beginPath(); ctx.moveTo(lx,ly);
      for (let s=0; s<10; s++) {
        lx+=(d_s(s*17+99)-0.5)*40; ly+=H/10;
        ctx.lineTo(lx,ly);
        // Ramificação
        if (d_s(s*17+200)>0.6) {
          ctx.stroke();
          ctx.beginPath(); ctx.moveTo(lx,ly);
          let bx2=lx, by2=ly;
          ctx.strokeStyle='rgba(200,230,255,0.5)'; ctx.lineWidth=1;
          for (let b=0; b<3; b++) { bx2+=(d_s(s*17+b+300)-0.4)*35; by2+=H/20; ctx.lineTo(bx2,by2); }
          ctx.stroke();
          ctx.strokeStyle='rgba(220,240,255,0.9)'; ctx.lineWidth=2.5;
          ctx.beginPath(); ctx.moveTo(lx,ly);
        }
      }
      ctx.stroke();
      ctx.shadowBlur=0; ctx.restore();
    }

    // Reflexos no chão molhado
    ctx.save(); ctx.globalAlpha=0.06;
    ctx.scale(1,-1); ctx.translate(0,-H*2+H*0.44);
    // Re-desenha silhueta invertida dos prédios
    const offR=(-camX)*0.05;
    for (let i=0; i<10; i++) {
      const bx=((d_s(i*43)*28000+offR)%28000)/28000*W;
      if (bx<-50||bx>W+50) continue;
      const bw=20+d_s(i*43+1)*35, bh=50+d_s(i*43+2)*110;
      ctx.fillStyle='rgba(255,200,100,0.3)';
      ctx.fillRect(bx-bw/2,H*0.78-bh,bw,bh);
    }
    ctx.restore();
  }

  // ===============================================================
  //  FASE 4 — Espaço Profundo (Realista)
  // ===============================================================
  else if (phase === 4) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#000003'); sky.addColorStop(0.5,'#030008'); sky.addColorStop(1,'#050012');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Via Láctea
    ctx.save(); ctx.globalCompositeOperation='screen';
    ctx.translate(W*0.5, H*0.3);
    ctx.rotate(-0.3);
    for (let i=0; i<400; i++) {
      const mx = (d_s(i*13)-0.5)*W*0.9;
      const my = (d_s(i*13+1)-0.5)*60 + Math.sin(mx*0.008)*20;
      const ms = d_s(i*13+2)*1.2+0.2;
      const ma = (0.08+d_s(i*13+3)*0.12) * (1-Math.abs(my)/80);
      if (ma < 0.02) continue;
      ctx.globalAlpha=ma;
      ctx.fillStyle=`hsl(${220+d_s(i*13+4)*40},${30+d_s(i*13+5)*30}%,${75+d_s(i*13+6)*25}%)`;
      ctx.beginPath(); ctx.arc(mx,my,ms,0,Math.PI*2); ctx.fill();
    }
    ctx.setTransform(1,0,0,1,0,0);
    ctx.restore();

    // Estrelas de fundo com cores reais
    for (let i=0; i<280; i++) {
      const sx=d_s(i*19)*W, sy=d_s(i*19+1)*H;
      const sa=0.25+0.6*d_s(i*19+2)+0.15*Math.sin(T*1.2+i*0.6);
      const sType = d_s(i*19+5);
      let sCol;
      if (sType<0.15) sCol='#ffa060'; // gigante vermelha
      else if (sType<0.3) sCol='#ffe8a0'; // amarela
      else if (sType<0.7) sCol='#ffffff'; // branca
      else sCol='#a0c0ff'; // azul
      ctx.globalAlpha=sa;
      ctx.fillStyle=sCol;
      const sr=d_s(i*19+3)*1.5+0.2;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      if (sr>1.3) {
        ctx.globalAlpha=sa*0.2;
        ctx.fillRect(sx-3,sy-0.3,6,0.6);
        ctx.fillRect(sx-0.3,sy-3,0.6,6);
      }
    }
    ctx.globalAlpha=1;

    // Nebulosa realista (múltiplas camadas com cores reais)
    ctx.save(); ctx.globalCompositeOperation='screen';
    const nebulae = [
      {x:W*0.15, y:H*0.20, r:140, h:280, s:70, l:20, a:0.06},
      {x:W*0.40, y:H*0.35, r:100, h:340, s:60, l:18, a:0.05},
      {x:W*0.65, y:H*0.25, r:120, h:210, s:65, l:22, a:0.04},
      {x:W*0.80, y:H*0.50, r:90,  h:30,  s:55, l:20, a:0.04},
    ];
    for (const neb of nebulae) {
      for (let layer=0; layer<3; layer++) {
        const nx=neb.x+d_s(layer*77)*30, ny=neb.y+d_s(layer*77+1)*20;
        const nr=neb.r*(0.6+layer*0.25);
        const ng=ctx.createRadialGradient(nx,ny,nr*0.1,nx,ny,nr);
        ng.addColorStop(0,`hsla(${neb.h+layer*15},${neb.s}%,${neb.l+layer*5}%,${neb.a})`);
        ng.addColorStop(0.6,`hsla(${neb.h+layer*15+10},${neb.s-10}%,${neb.l}%,${neb.a*0.4})`);
        ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx,ny,nr,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();

    // ── PLANETA REALISTA (Júpiter-like) ─────────────────────────────
    const px=W*0.62+(-camX)*0.003, py=H*0.30, pr=65;

    // Glow atmosférico externo (múltiplas camadas)
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (const [cr,cg2,cb,ri,ro,a] of [
      [255,180,100, pr*0.8, pr*4.0, 0.03],
      [200,120,60, pr*0.9, pr*2.8, 0.05],
      [180,100,50, pr*1.0, pr*2.0, 0.08],
    ]) {
      const g2=ctx.createRadialGradient(px,py,ri,px,py,ro);
      g2.addColorStop(0,`rgba(${cr},${cg2},${cb},${a})`); g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(px,py,ro,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Corpo do planeta — gradiente base realista
    const pGrad=ctx.createRadialGradient(px-pr*0.35,py-pr*0.35,pr*0.02,px,py,pr);
    pGrad.addColorStop(0.00,'#f0dcc0');
    pGrad.addColorStop(0.10,'#e8c8a0');
    pGrad.addColorStop(0.25,'#d4a878');
    pGrad.addColorStop(0.40,'#c08050');
    pGrad.addColorStop(0.55,'#a06838');
    pGrad.addColorStop(0.70,'#885028');
    pGrad.addColorStop(0.85,'#603818');
    pGrad.addColorStop(1.00,'#2a1808');
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);
    ctx.fillStyle=pGrad; ctx.fill();

    // Bandas atmosféricas detalhadas (estilo Júpiter)
    ctx.save(); ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.clip();
    const bandColors = [
      [py-pr*0.78, pr*0.06, 'rgba(210,170,110,0.5)'],
      [py-pr*0.60, pr*0.10, 'rgba(180,110,50,0.55)'],
      [py-pr*0.42, pr*0.07, 'rgba(240,210,160,0.4)'],
      [py-pr*0.25, pr*0.12, 'rgba(160,80,30,0.6)'],
      [py-pr*0.05, pr*0.08, 'rgba(220,180,120,0.35)'],
      [py+pr*0.12, pr*0.14, 'rgba(140,70,25,0.65)'],
      [py+pr*0.30, pr*0.06, 'rgba(230,200,150,0.4)'],
      [py+pr*0.45, pr*0.10, 'rgba(170,100,40,0.5)'],
      [py+pr*0.62, pr*0.08, 'rgba(200,150,90,0.45)'],
      [py+pr*0.78, pr*0.06, 'rgba(120,60,20,0.5)'],
    ];
    for (const [by2,bh,col] of bandColors) {
      const waveY = by2 + Math.sin(T*0.08 + by2*0.1)*1.5;
      ctx.fillStyle=col;
      ctx.beginPath();
      // Ondulação realista nas bandas
      for (let bx=-pr; bx<=pr; bx+=2) {
        const edge = Math.sqrt(Math.max(0, pr*pr - bx*bx));
        const wy = waveY + Math.sin(bx*0.08+T*0.15)*2 + Math.sin(bx*0.03-T*0.07)*3;
        if (bx===-pr) ctx.moveTo(px+bx, wy-bh);
        else ctx.lineTo(px+bx, wy-bh);
      }
      for (let bx=pr; bx>=-pr; bx-=2) {
        const wy = waveY + Math.sin(bx*0.08+T*0.15)*2 + Math.sin(bx*0.03-T*0.07)*3;
        ctx.lineTo(px+bx, wy+bh);
      }
      ctx.closePath(); ctx.fill();
    }

    // Grande Mancha Vermelha
    const spotX = px - pr*0.15 + Math.sin(T*0.03)*3;
    const spotY = py + pr*0.13;
    const spotRx = pr*0.22, spotRy = pr*0.12;
    // Sombra da mancha
    const spotGrad = ctx.createRadialGradient(spotX,spotY,0,spotX,spotY,spotRx);
    spotGrad.addColorStop(0,'rgba(180,50,20,0.7)');
    spotGrad.addColorStop(0.3,'rgba(200,70,30,0.6)');
    spotGrad.addColorStop(0.6,'rgba(160,60,25,0.4)');
    spotGrad.addColorStop(1,'rgba(140,50,20,0.0)');
    ctx.fillStyle=spotGrad;
    ctx.save(); ctx.translate(spotX,spotY); ctx.rotate(Math.sin(T*0.02)*0.1);
    ctx.beginPath(); ctx.ellipse(0,0,spotRx,spotRy,0,0,Math.PI*2); ctx.fill();
    // Vórtice interno
    ctx.strokeStyle='rgba(220,100,40,0.3)'; ctx.lineWidth=1;
    for (let v=0;v<3;v++) {
      const vr = spotRx*(0.3+v*0.2);
      ctx.beginPath();
      ctx.ellipse(Math.sin(T*0.05+v)*2, Math.cos(T*0.04+v)*1.5, vr, vr*0.5, T*0.02+v*0.8, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();

    // Turbulência/textura na superfície
    ctx.save(); ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.clip();
    ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.08;
    for (let ti=0;ti<40;ti++) {
      const tx2=px-pr+d_s(ti*73)*pr*2;
      const ty2=py-pr+d_s(ti*73+1)*pr*2;
      const tr2=2+d_s(ti*73+2)*8;
      ctx.fillStyle=d_s(ti*73+3)>0.5?'#fff':'#000';
      ctx.beginPath(); ctx.arc(tx2,ty2,tr2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Terminador (sombra do lado escuro)
    ctx.save();
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.clip();
    const termGrad=ctx.createLinearGradient(px-pr*1.2,py,px+pr*0.8,py);
    termGrad.addColorStop(0,'rgba(0,0,0,0)');
    termGrad.addColorStop(0.5,'rgba(0,0,0,0)');
    termGrad.addColorStop(0.8,'rgba(0,0,0,0.3)');
    termGrad.addColorStop(1,'rgba(0,0,0,0.7)');
    ctx.fillStyle=termGrad; ctx.fillRect(px-pr,py-pr,pr*2,pr*2);
    ctx.restore();

    // Rim light (luz de borda)
    ctx.save(); ctx.globalCompositeOperation='screen';
    const rim=ctx.createRadialGradient(px+pr*0.15,py,pr*0.85,px,py,pr);
    rim.addColorStop(0,'rgba(0,0,0,0)');
    rim.addColorStop(0.85,'rgba(0,0,0,0)');
    rim.addColorStop(0.93,'rgba(255,200,120,0.15)');
    rim.addColorStop(1,'rgba(255,180,80,0.35)');
    ctx.fillStyle=rim; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Reflexo especular sutil
    ctx.save(); ctx.globalCompositeOperation='screen';
    const specGrad=ctx.createRadialGradient(px-pr*0.35,py-pr*0.35,0,px-pr*0.35,py-pr*0.35,pr*0.4);
    specGrad.addColorStop(0,'rgba(255,255,240,0.12)');
    specGrad.addColorStop(0.5,'rgba(255,240,200,0.04)');
    specGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=specGrad; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Asteroides com sombra
    const aoff=(-camX)*0.10;
    for (let i=0; i<20; i++) {
      const ax=((d_s(i*31)*28000+aoff)%28000)/28000*W;
      if (ax<-30||ax>W+30) continue;
      const ay=H*0.08+d_s(i*31+1)*H*0.70;
      const ar=3+d_s(i*31+2)*12;
      const arot=T*(0.3+d_s(i*31+3)*0.6);
      ctx.save(); ctx.translate(ax,ay); ctx.rotate(arot);
      // Corpo
      const aHue=20+d_s(i*31+5)*25;
      ctx.fillStyle=`hsl(${aHue},15%,${16+d_s(i*31+6)*12}%)`;
      ctx.beginPath();
      const np=5+Math.floor(d_s(i*31+7)*4);
      for (let v=0; v<np; v++) {
        const va=(v/np)*Math.PI*2, vr=ar*(0.65+d_s(i*31+v+8)*0.45);
        v===0?ctx.moveTo(Math.cos(va)*vr,Math.sin(va)*vr):ctx.lineTo(Math.cos(va)*vr,Math.sin(va)*vr);
      }
      ctx.closePath(); ctx.fill();
      // Iluminação lateral
      ctx.fillStyle=`hsl(${aHue},10%,${24+d_s(i*31+6)*8}%)`;
      ctx.beginPath(); ctx.arc(-ar*0.2,-ar*0.2,ar*0.6,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ===============================================================
  //  FASE 5 — Vulcânico Realista
  // ===============================================================
  else if (phase === 5) {
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#080200'); sky.addColorStop(0.25,'#1a0804'); sky.addColorStop(0.5,'#381008'); sky.addColorStop(0.75,'#501808'); sky.addColorStop(1,'#602000');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Fumaça volumétrica no céu
    for (let layer=0; layer<2; layer++) {
      for (let i=0; i<10; i++) {
        const csx=(d_s(i*29+layer*40)*W*2.5+T*(6+layer*3)*(0.8+d_s(i*29+1)*0.4))%(W*2.5)-W*0.3;
        if (csx<-200||csx>W+200) continue;
        const csy=20+layer*40+d_s(i*29+2)*70;
        ctx.save(); ctx.globalAlpha=0.25-layer*0.08;
        for (let b=0; b<3; b++) {
          const bx2=csx+d_s(i*29+b+3)*100-50;
          const by2=csy+d_s(i*29+b+6)*20;
          const br=40+d_s(i*29+b+9)*50;
          const cg=ctx.createRadialGradient(bx2,by2,br*0.1,bx2,by2,br);
          cg.addColorStop(0,'rgba(30,12,8,0.9)'); cg.addColorStop(1,'rgba(15,5,2,0)');
          ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx2,by2,br,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
      }
    }

    // Montanha vulcânica distante com detalhes
    const off1=(-camX)*0.015;
    for (let i=0; i<4; i++) {
      const vx=((i*6000+off1+500)%18000)/18000*W;
      if (vx<-200||vx>W+200) continue;
      const vh=80+d_s(i*17)*55, vw=130+d_s(i*17+1)*70;
      // Corpo da montanha com gradiente
      const mGrad=ctx.createLinearGradient(vx,H*0.68-vh,vx,H*0.68);
      mGrad.addColorStop(0,'#1a0800'); mGrad.addColorStop(0.7,'#120400'); mGrad.addColorStop(1,'#0e0300');
      ctx.fillStyle=mGrad;
      ctx.beginPath(); ctx.moveTo(vx-vw,H*0.68); ctx.lineTo(vx-vw*0.1,H*0.68-vh);
      ctx.lineTo(vx+vw*0.1,H*0.68-vh); ctx.lineTo(vx+vw,H*0.68); ctx.closePath(); ctx.fill();
      // Cratera com lava
      ctx.save(); ctx.globalCompositeOperation='screen';
      const vcg=ctx.createRadialGradient(vx,H*0.68-vh,0,vx,H*0.68-vh,35+d_s(i*17+2)*15);
      vcg.addColorStop(0,`rgba(255,${160+Math.sin(T*1.5+i)*40|0},0,0.5)`);
      vcg.addColorStop(0.5,`rgba(255,80,0,0.2)`);
      vcg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=vcg; ctx.beginPath(); ctx.arc(vx,H*0.68-vh,35+d_s(i*17+2)*15,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Estrias de lava escorrendo
      ctx.save(); ctx.globalCompositeOperation='screen';
      for (let s=0; s<3; s++) {
        const sx2=vx+(s-1)*vw*0.15;
        const lGrad=ctx.createLinearGradient(sx2,H*0.68-vh*0.7,sx2,H*0.68);
        lGrad.addColorStop(0,`rgba(255,100,0,${0.15+0.08*Math.sin(T*1.8+s)})`);
        lGrad.addColorStop(1,'rgba(180,30,0,0)');
        ctx.fillStyle=lGrad;
        ctx.fillRect(sx2-2,H*0.68-vh*0.7,4,vh*0.7);
      }
      ctx.restore();
    }

    // Rochas em primeiro plano
    const off2=(-camX)*0.06;
    for (let i=0; i<12; i++) {
      const rx=((d_s(i*51)*28000+off2)%28000)/28000*W;
      if (rx<-40||rx>W+40) continue;
      const rh=20+d_s(i*51+1)*40;
      const rw2=15+d_s(i*51+2)*30;
      const rGrad=ctx.createLinearGradient(rx,H*0.85-rh,rx,H*0.85);
      rGrad.addColorStop(0,'#1e0a04'); rGrad.addColorStop(1,'#100400');
      ctx.fillStyle=rGrad;
      ctx.beginPath();
      ctx.moveTo(rx-rw2,H*0.85);
      const pts=5+Math.floor(d_s(i*51+3)*3);
      for (let p=0; p<pts; p++) {
        const pa=(p/pts)*Math.PI;
        const pr2=rh*(0.7+d_s(i*51+p+4)*0.4);
        ctx.lineTo(rx-rw2+Math.cos(Math.PI-pa)*rw2*2*(0.5+0.5*Math.cos(pa)), H*0.85-Math.sin(pa)*pr2);
      }
      ctx.lineTo(rx+rw2,H*0.85);
      ctx.closePath(); ctx.fill();
    }

    // Rios de lava (mais largos e realistas)
    const off3=(-camX)*0.09;
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (let i=0; i<5; i++) {
      const lx=((d_s(i*47)*28000+off3)%28000)/28000*W;
      if (lx<-20||lx>W+20) continue;
      const lw=6+d_s(i*47+1)*8;
      const la=0.22+0.12*Math.sin(T*1.8+i*1.5);
      // Rio com gradiente lateral
      const lg=ctx.createLinearGradient(lx-lw,H*0.72,lx+lw,H*0.72);
      lg.addColorStop(0,'rgba(120,20,0,0)');
      lg.addColorStop(0.3,`rgba(255,${80+d_s(i*47+2)*60|0},0,${la})`);
      lg.addColorStop(0.5,`rgba(255,${150+Math.sin(T*2.5+i)*50|0},30,${la*1.3})`);
      lg.addColorStop(0.7,`rgba(255,${80+d_s(i*47+2)*60|0},0,${la})`);
      lg.addColorStop(1,'rgba(120,20,0,0)');
      ctx.fillStyle=lg; ctx.fillRect(lx-lw,H*0.72,lw*2,H*0.28);
    }
    ctx.restore();

    // Brasas e cinzas subindo
    for (let i=0; i<50; i++) {
      const eph=(T*0.6+d_s(i*13)*10)%10;
      const ex=d_s(i*13+1)*W+Math.sin(T*1.2+i)*15+Math.cos(T*0.8+i*0.6)*8;
      const ey=H-(eph/10)*H*1.15;
      if (ey<-10||ey>H+10) continue;
      const eLife = 1-eph/10;
      ctx.save();
      if (d_s(i*13+5)>0.4) {
        // Brasa (quente)
        ctx.globalAlpha=0.6*eLife;
        const eHue=15+d_s(i*13+2)*25;
        ctx.fillStyle=`hsl(${eHue},100%,${50+d_s(i*13+3)*25}%)`;
        ctx.beginPath(); ctx.arc(ex,ey,1+d_s(i*13+4)*2,0,Math.PI*2); ctx.fill();
        // Glow
        ctx.globalCompositeOperation='screen';
        ctx.globalAlpha=0.15*eLife;
        const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,6);
        eg.addColorStop(0,`rgba(255,120,0,0.5)`); eg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,6,0,Math.PI*2); ctx.fill();
      } else {
        // Cinza (fria)
        ctx.globalAlpha=0.3*eLife;
        ctx.fillStyle=`rgba(80,60,50,1)`;
        ctx.beginPath(); ctx.arc(ex,ey,0.8+d_s(i*13+4)*1.5,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // Brilho de calor no horizonte
    ctx.save(); ctx.globalCompositeOperation='screen';
    const heatGlow=ctx.createLinearGradient(0,H*0.65,0,H);
    heatGlow.addColorStop(0,'rgba(0,0,0,0)');
    heatGlow.addColorStop(0.4,`rgba(160,30,0,${0.08+0.04*Math.sin(T*1.2)})`);
    heatGlow.addColorStop(1,`rgba(200,50,0,${0.18+0.08*Math.sin(T*1.0)})`);
    ctx.fillStyle=heatGlow; ctx.fillRect(0,H*0.65,W,H*0.35);
    ctx.restore();

    // Distorção de calor (ondulação sutil simulada com linhas)
    ctx.save(); ctx.globalAlpha=0.03;
    for (let y=H*0.7; y<H; y+=8) {
      const wave=Math.sin(T*2+y*0.05)*3;
      ctx.strokeStyle='rgba(255,100,0,1)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y);
      for (let x=0; x<W; x+=20) {
        ctx.lineTo(x,y+Math.sin(T*3+x*0.02+y*0.01)*wave);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ===============================================================
  //  FASE 6 — Castelo Assombrado (Nível 2)
  // ===============================================================
  else if (phase === 6) {
    // Céu noturno ameaçador — roxo escuro/carmesim
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#04000a'); sky.addColorStop(0.2,'#0a0218'); sky.addColorStop(0.5,'#120420'); sky.addColorStop(0.75,'#180618'); sky.addColorStop(1,'#0e0410');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Nuvens de tempestade pesadas (roxas/vermelhas)
    for (let layer=0; layer<3; layer++) {
      ctx.save();
      for (let i=0; i<10; i++) {
        const csx=(d_s(i*33+layer*60)*W*3+T*(5+layer*3)*(0.7+d_s(i*33+1)*0.5))%(W*3)-W*0.5;
        if (csx<-280||csx>W+280) continue;
        const csy=5+layer*25+d_s(i*33+2+layer)*50;
        ctx.globalAlpha=0.35-layer*0.08;
        for (let b=0; b<5; b++) {
          const bx2=csx+d_s(i*33+b+3)*140-70;
          const by2=csy+d_s(i*33+b+8)*20;
          const br=30+d_s(i*33+b+13)*40;
          const cg=ctx.createRadialGradient(bx2,by2,br*0.1,bx2,by2,br);
          cg.addColorStop(0,`rgba(${20+layer*10},5,${15+layer*5},0.9)`); cg.addColorStop(1,'rgba(5,0,8,0)');
          ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx2,by2,br,0,Math.PI*2); ctx.fill();
        }
      }
      ctx.restore();
    }

    // ── SILHUETA DO LOBO com olhos vermelhos ──────────────────
    const wolfX = W*0.78 + (-camX)*0.004;
    const wolfY = H*0.22;
    const wolfScale = 1.0;

    // Halo sinistro atrás do lobo
    ctx.save(); ctx.globalCompositeOperation='screen';
    const wolfHalo=ctx.createRadialGradient(wolfX,wolfY+20,0,wolfX,wolfY+20,120);
    wolfHalo.addColorStop(0,'rgba(80,0,0,0.08)'); wolfHalo.addColorStop(0.5,'rgba(40,0,20,0.04)'); wolfHalo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wolfHalo; ctx.beginPath(); ctx.arc(wolfX,wolfY+20,120,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Silhueta da cabeça do lobo (forma escura)
    ctx.save();
    ctx.fillStyle='#050008';
    ctx.beginPath();
    // Orelha esquerda
    ctx.moveTo(wolfX-45*wolfScale, wolfY-15*wolfScale);
    ctx.lineTo(wolfX-30*wolfScale, wolfY-55*wolfScale);
    ctx.lineTo(wolfX-15*wolfScale, wolfY-20*wolfScale);
    // Topo da cabeça
    ctx.quadraticCurveTo(wolfX, wolfY-30*wolfScale, wolfX+15*wolfScale, wolfY-20*wolfScale);
    // Orelha direita
    ctx.lineTo(wolfX+30*wolfScale, wolfY-55*wolfScale);
    ctx.lineTo(wolfX+45*wolfScale, wolfY-15*wolfScale);
    // Lado direito da cabeça
    ctx.quadraticCurveTo(wolfX+55*wolfScale, wolfY+5*wolfScale, wolfX+50*wolfScale, wolfY+25*wolfScale);
    // Focinho
    ctx.quadraticCurveTo(wolfX+40*wolfScale, wolfY+40*wolfScale, wolfX+25*wolfScale, wolfY+50*wolfScale);
    ctx.lineTo(wolfX+15*wolfScale, wolfY+55*wolfScale);
    // Mandíbula inferior
    ctx.quadraticCurveTo(wolfX, wolfY+60*wolfScale, wolfX-15*wolfScale, wolfY+55*wolfScale);
    ctx.lineTo(wolfX-25*wolfScale, wolfY+50*wolfScale);
    ctx.quadraticCurveTo(wolfX-40*wolfScale, wolfY+40*wolfScale, wolfX-50*wolfScale, wolfY+25*wolfScale);
    ctx.quadraticCurveTo(wolfX-55*wolfScale, wolfY+5*wolfScale, wolfX-45*wolfScale, wolfY-15*wolfScale);
    ctx.closePath();
    ctx.fill();

    // Olhos vermelhos brilhantes
    const eyePulse = 0.7 + 0.3*Math.sin(T*2.5);
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (const [ex,ey] of [[wolfX-18*wolfScale, wolfY+2*wolfScale],[wolfX+18*wolfScale, wolfY+2*wolfScale]]) {
      // Glow externo
      const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,18);
      eg.addColorStop(0,`rgba(255,0,0,${eyePulse*0.6})`); eg.addColorStop(0.4,`rgba(200,0,0,${eyePulse*0.25})`); eg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,18,0,Math.PI*2); ctx.fill();
      // Olho interno
      ctx.fillStyle=`rgba(255,20,0,${eyePulse})`;
      ctx.beginPath(); ctx.ellipse(ex,ey,5,3.5,0,0,Math.PI*2); ctx.fill();
      // Brilho central
      ctx.fillStyle=`rgba(255,200,150,${eyePulse*0.8})`;
      ctx.beginPath(); ctx.arc(ex,ey,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    ctx.restore();

    // ── CASTELO em silhueta ──────────────────────────────────
    const cOff=(-camX)*0.025;
    ctx.fillStyle='#060010';
    // Torres e muralhas
    for (let i=0; i<6; i++) {
      const tx2=((d_s(i*59)*28000+cOff)%28000)/28000*W;
      if (tx2<-80||tx2>W+80) continue;
      const tw=25+d_s(i*59+1)*40;
      const th2=80+d_s(i*59+2)*120;
      // Torre
      ctx.fillRect(tx2-tw/2, H*0.55-th2, tw, th2+H*0.45);
      // Topo pontiagudo
      ctx.beginPath();
      ctx.moveTo(tx2-tw/2-5, H*0.55-th2);
      ctx.lineTo(tx2, H*0.55-th2-30-d_s(i*59+3)*20);
      ctx.lineTo(tx2+tw/2+5, H*0.55-th2);
      ctx.closePath(); ctx.fill();
      // Ameias no topo
      for (let a=0; a<Math.floor(tw/8); a++) {
        ctx.fillRect(tx2-tw/2+a*8, H*0.55-th2-5, 5, 5);
      }
      // Janela com luz sinistra
      if (d_s(i*59+4)>0.4) {
        const wy=H*0.55-th2+20+d_s(i*59+5)*40;
        ctx.save(); ctx.globalCompositeOperation='screen';
        const wg=ctx.createRadialGradient(tx2,wy,0,tx2,wy,12);
        wg.addColorStop(0,`rgba(180,60,0,${0.3+0.15*Math.sin(T*1.5+i)})`);
        wg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=wg; ctx.beginPath(); ctx.arc(tx2,wy,12,0,Math.PI*2); ctx.fill();
        // Forma da janela (arco gótico)
        ctx.fillStyle=`rgba(200,80,10,${0.25+0.1*Math.sin(T*1.5+i)})`;
        ctx.beginPath(); ctx.ellipse(tx2,wy,4,7,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
    // Muralha contínua
    const wallOff=(-camX)*0.03;
    ctx.fillStyle='#040008';
    ctx.fillRect(0, H*0.62, W, H*0.38);
    // Textura da muralha
    ctx.save(); ctx.globalAlpha=0.1;
    for (let i=0; i<30; i++) {
      const rx=d_s(i*41)*W, ry=H*0.65+d_s(i*41+1)*H*0.2;
      ctx.fillStyle=d_s(i*41+2)>0.5?'#0a0015':'#030006';
      ctx.fillRect(rx,ry,8+d_s(i*41+3)*15,4+d_s(i*41+4)*8);
    }
    ctx.restore();

    // ── MORCEGOS voando ─────────────────────────────────────
    for (let i=0; i<12; i++) {
      const bx=((d_s(i*71)*W*2+T*25*(0.8+d_s(i*71+1)*0.5))%(W*2))-W*0.2;
      const by=H*0.08+d_s(i*71+2)*H*0.45+Math.sin(T*1.8+i*2.3)*15;
      if (bx<-20||bx>W+20) continue;
      const wingPhase = T*8+i*3.7;
      const wingAngle = Math.sin(wingPhase)*0.8;
      const bs = 4+d_s(i*71+3)*6;
      ctx.save();
      ctx.translate(bx, by);
      ctx.fillStyle='#0a0012';
      // Corpo
      ctx.beginPath(); ctx.ellipse(0,0,bs*0.4,bs*0.25,0,0,Math.PI*2); ctx.fill();
      // Asa esquerda
      ctx.beginPath();
      ctx.moveTo(-bs*0.3, 0);
      ctx.quadraticCurveTo(-bs*(0.8+wingAngle*0.3), -bs*(0.5+wingAngle*0.4), -bs*(1.2+wingAngle*0.2), -bs*wingAngle*0.3);
      ctx.quadraticCurveTo(-bs*0.7, bs*0.15, -bs*0.3, 0);
      ctx.fill();
      // Asa direita
      ctx.beginPath();
      ctx.moveTo(bs*0.3, 0);
      ctx.quadraticCurveTo(bs*(0.8+wingAngle*0.3), -bs*(0.5+wingAngle*0.4), bs*(1.2+wingAngle*0.2), -bs*wingAngle*0.3);
      ctx.quadraticCurveTo(bs*0.7, bs*0.15, bs*0.3, 0);
      ctx.fill();
      ctx.restore();
    }

    // ── RELÂMPAGO FORTE (mais frequente que fase 3) ────────
    const lightningChance = Math.sin(T*2.8)*Math.sin(T*5.7)*Math.sin(T*8.3);
    if (lightningChance > 0.6) {
      ctx.save(); ctx.globalCompositeOperation='screen';
      // Flash intenso no céu (roxo/branco)
      ctx.fillStyle='rgba(180,160,220,0.15)'; ctx.fillRect(0,0,W,H);
      // Raio principal com ramificações
      let lx=W*0.15+Math.sin(T*4)*W*0.7, ly=0;
      ctx.strokeStyle='rgba(200,180,255,0.95)'; ctx.lineWidth=3;
      ctx.shadowColor='rgba(150,100,255,0.9)'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.moveTo(lx,ly);
      for (let s=0; s<12; s++) {
        lx+=(d_s(s*19+77)-0.5)*50; ly+=H/12;
        ctx.lineTo(lx,ly);
        if (d_s(s*19+180)>0.5) {
          ctx.stroke();
          ctx.beginPath(); ctx.moveTo(lx,ly);
          let bx2=lx, by2=ly;
          ctx.strokeStyle='rgba(180,150,255,0.6)'; ctx.lineWidth=1.5;
          for (let b=0; b<4; b++) { bx2+=(d_s(s*19+b+280)-0.4)*40; by2+=H/18; ctx.lineTo(bx2,by2); }
          ctx.stroke();
          ctx.strokeStyle='rgba(200,180,255,0.95)'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.moveTo(lx,ly);
        }
      }
      ctx.stroke();
      ctx.shadowBlur=0; ctx.restore();
    }

    // Névoa rasteira verde/roxa sinistra
    for (let f=0; f<4; f++) {
      const fogY = H*0.68 + f*H*0.05;
      ctx.save();
      ctx.globalAlpha = 0.10 - f*0.02 + 0.03*Math.sin(T*0.4+f);
      const fog=ctx.createLinearGradient(0,fogY,0,fogY+H*0.10);
      fog.addColorStop(0,'rgba(0,0,0,0)');
      fog.addColorStop(0.5,`rgba(${20+f*10},${40-f*8},${30+f*10},1)`);
      fog.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=fog; ctx.fillRect(0,fogY,W,H*0.10);
      ctx.restore();
    }

    // Chão de pedra do castelo
    const ground=ctx.createLinearGradient(0,H*0.84,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(8,2,12,0.9)'); ground.addColorStop(1,'rgba(5,1,8,0.95)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.84,W,H*0.16);
  }

  // ===============================================================
  //  FASE 7 — Cemitério Maldito (Nível 2 Fase 2)
  // ===============================================================
  else if (phase === 7) {
    // Céu vermelho-sangue com nuvens escuras
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#08000a'); sky.addColorStop(0.15,'#1a0008'); sky.addColorStop(0.35,'#2a0510'); sky.addColorStop(0.55,'#1a0308'); sky.addColorStop(0.75,'#0c0206'); sky.addColorStop(1,'#060104');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // ── LUA DE SANGUE ──────────────────────────────────────────
    const moonX = W*0.82 + (-camX)*0.003;
    const moonY = H*0.15;
    const moonR = 45;
    // Halo vermelho externo
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (let r=3; r>=1; r--) {
      const halo=ctx.createRadialGradient(moonX,moonY,moonR*0.5,moonX,moonY,moonR*r*1.2);
      halo.addColorStop(0,`rgba(180,0,0,${0.08/r})`); halo.addColorStop(0.5,`rgba(120,0,0,${0.04/r})`); halo.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(moonX,moonY,moonR*r*1.2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // Corpo da lua
    ctx.save();
    const moonGrad=ctx.createRadialGradient(moonX-8,moonY-5,0,moonX,moonY,moonR);
    moonGrad.addColorStop(0,'#cc2010'); moonGrad.addColorStop(0.4,'#991008'); moonGrad.addColorStop(0.8,'#660808'); moonGrad.addColorStop(1,'#330404');
    ctx.fillStyle=moonGrad; ctx.beginPath(); ctx.arc(moonX,moonY,moonR,0,Math.PI*2); ctx.fill();
    // Crateras
    ctx.globalAlpha=0.15;
    for (let i=0; i<6; i++) {
      const cx2=moonX-15+d_s(i*97)*30, cy2=moonY-12+d_s(i*97+1)*24, cr=3+d_s(i*97+2)*8;
      ctx.fillStyle='#1a0000'; ctx.beginPath(); ctx.arc(cx2,cy2,cr,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // Nuvens escuras passando na frente da lua
    for (let i=0; i<8; i++) {
      const csx=(d_s(i*47)*W*3+T*(8+d_s(i*47+1)*6))%(W*3)-W*0.3;
      if (csx<-250||csx>W+250) continue;
      const csy=10+d_s(i*47+2)*H*0.35;
      ctx.save(); ctx.globalAlpha=0.25+d_s(i*47+3)*0.15;
      for (let b=0; b<4; b++) {
        const bx2=csx+d_s(i*47+b+4)*180-90;
        const by2=csy+d_s(i*47+b+8)*25;
        const br=25+d_s(i*47+b+12)*35;
        const cg=ctx.createRadialGradient(bx2,by2,br*0.1,bx2,by2,br);
        cg.addColorStop(0,'rgba(8,2,4,0.9)'); cg.addColorStop(1,'rgba(3,0,2,0)');
        ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx2,by2,br,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    // ── LÁPIDES em silhueta ─────────────────────────────────────
    const graveOff=(-camX)*0.04;
    for (let i=0; i<18; i++) {
      const gx=((d_s(i*83)*W*2.5+graveOff)%(W*2.5))/2.5;
      if (gx<-40||gx>W+40) continue;
      const gh=20+d_s(i*83+1)*40;
      const gw=10+d_s(i*83+2)*15;
      const gy=H*0.68+d_s(i*83+3)*H*0.10;
      ctx.fillStyle='#0a0208';
      // Tipos de lápide
      const type=d_s(i*83+4);
      if (type<0.4) {
        // Retangular com topo arredondado
        ctx.fillRect(gx-gw/2, gy-gh, gw, gh);
        ctx.beginPath(); ctx.arc(gx, gy-gh, gw/2, Math.PI, 0); ctx.fill();
      } else if (type<0.7) {
        // Cruz
        ctx.fillRect(gx-gw*0.15, gy-gh, gw*0.3, gh);
        ctx.fillRect(gx-gw*0.5, gy-gh*0.7, gw, gw*0.25);
      } else {
        // Pedra irregular
        ctx.beginPath();
        ctx.moveTo(gx-gw/2, gy);
        ctx.lineTo(gx-gw/2+2, gy-gh*0.8);
        ctx.quadraticCurveTo(gx, gy-gh-5, gx+gw/2-2, gy-gh*0.85);
        ctx.lineTo(gx+gw/2, gy);
        ctx.closePath(); ctx.fill();
      }
      // Texto RIP fantasma
      if (d_s(i*83+5)>0.5 && gh>30) {
        ctx.save(); ctx.globalAlpha=0.12;
        ctx.fillStyle='#440015'; ctx.font='6px Georgia'; ctx.textAlign='center';
        ctx.fillText('RIP', gx, gy-gh*0.4);
        ctx.textAlign='left'; ctx.restore();
      }
    }

    // ── MÃOS saindo do chão ────────────────────────────────────
    for (let i=0; i<8; i++) {
      const hx=((d_s(i*67)*W*2+T*0.5*(0.5+d_s(i*67+1)*0.5))%(W*2))-W*0.1;
      if (hx<-25||hx>W+25) continue;
      const hy=H*0.80+d_s(i*67+2)*H*0.06;
      const hscale=0.6+d_s(i*67+3)*0.6;
      const sway=Math.sin(T*0.8+i*2.1)*3*hscale;
      ctx.save();
      ctx.translate(hx+sway, hy);
      ctx.scale(hscale, hscale);
      ctx.fillStyle='#0c0308';
      // Braço
      ctx.fillRect(-3, 0, 6, 30);
      // Palma
      ctx.beginPath(); ctx.ellipse(0, -2, 8, 6, 0, 0, Math.PI*2); ctx.fill();
      // Dedos (5)
      for (let f=0; f<5; f++) {
        const fx=-8+f*4, fy=-5-f*2+(f>2?(f-2)*2:0);
        const fh=10+d_s(i*67+f+4)*6;
        const fang=(f-2)*0.15+Math.sin(T*1.2+i+f)*0.08;
        ctx.save(); ctx.translate(fx, fy); ctx.rotate(fang);
        ctx.fillRect(-1.5, -fh, 3, fh);
        ctx.restore();
      }
      ctx.restore();
    }

    // ── CORVOS voando ──────────────────────────────────────────
    for (let i=0; i<10; i++) {
      const cx2=((d_s(i*91)*W*3+T*18*(0.6+d_s(i*91+1)*0.8))%(W*3))-W*0.3;
      const cy2=H*0.05+d_s(i*91+2)*H*0.40+Math.sin(T*1.2+i*2.8)*20;
      if (cx2<-30||cx2>W+30) continue;
      const wingPh=T*6+i*4.1;
      const wingA=Math.sin(wingPh)*0.7;
      const cs=5+d_s(i*91+3)*5;
      ctx.save();
      ctx.translate(cx2, cy2);
      ctx.fillStyle='#060008';
      // Corpo
      ctx.beginPath(); ctx.ellipse(0,0,cs*0.5,cs*0.2,0,0,Math.PI*2); ctx.fill();
      // Asa esquerda (angular como corvo)
      ctx.beginPath();
      ctx.moveTo(-cs*0.3, 0);
      ctx.lineTo(-cs*(1.0+wingA*0.2), -cs*(0.4+wingA*0.5));
      ctx.lineTo(-cs*0.8, -cs*wingA*0.2);
      ctx.lineTo(-cs*0.3, cs*0.05);
      ctx.fill();
      // Asa direita
      ctx.beginPath();
      ctx.moveTo(cs*0.3, 0);
      ctx.lineTo(cs*(1.0+wingA*0.2), -cs*(0.4+wingA*0.5));
      ctx.lineTo(cs*0.8, -cs*wingA*0.2);
      ctx.lineTo(cs*0.3, cs*0.05);
      ctx.fill();
      // Bico
      ctx.beginPath();
      ctx.moveTo(cs*0.5, -cs*0.05);
      ctx.lineTo(cs*0.75, cs*0.05);
      ctx.lineTo(cs*0.5, cs*0.1);
      ctx.fill();
      ctx.restore();
    }

    // ── RELÂMPAGOS VERMELHOS (raros mas dramáticos) ──────────
    const lChance = Math.sin(T*1.8)*Math.sin(T*4.3)*Math.sin(T*7.1);
    if (lChance > 0.7) {
      ctx.save(); ctx.globalCompositeOperation='screen';
      ctx.fillStyle='rgba(150,20,20,0.12)'; ctx.fillRect(0,0,W,H);
      let lx2=W*0.2+Math.sin(T*3.5)*W*0.6, ly2=0;
      ctx.strokeStyle='rgba(220,60,40,0.85)'; ctx.lineWidth=2.5;
      ctx.shadowColor='rgba(200,30,20,0.8)'; ctx.shadowBlur=18;
      ctx.beginPath(); ctx.moveTo(lx2,ly2);
      for (let s=0; s<10; s++) {
        lx2+=(d_s(s*23+99)-0.5)*45; ly2+=H/10;
        ctx.lineTo(lx2,ly2);
      }
      ctx.stroke();
      ctx.shadowBlur=0; ctx.restore();
    }

    // Névoa verde/cinza rasteira de cemitério
    for (let f=0; f<5; f++) {
      const fogY = H*0.70 + f*H*0.04;
      ctx.save();
      ctx.globalAlpha = 0.08 - f*0.012 + 0.025*Math.sin(T*0.3+f*1.5);
      const fog=ctx.createLinearGradient(0,fogY,0,fogY+H*0.08);
      fog.addColorStop(0,'rgba(0,0,0,0)');
      fog.addColorStop(0.5,`rgba(${15+f*5},${25-f*3},${12+f*4},1)`);
      fog.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=fog; ctx.fillRect(0,fogY,W,H*0.08);
      ctx.restore();
    }

    // Chão de terra do cemitério
    const ground=ctx.createLinearGradient(0,H*0.82,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(12,4,6,0.9)'); ground.addColorStop(1,'rgba(8,2,4,0.95)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.82,W,H*0.18);
  }

  // ===============================================================
  //  FASE 8 — Cyberpunk Blade Runner
  // ===============================================================
  else if (phase === 8) {
    // Céu noturno púrpura/laranja poluído
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#05020a'); sky.addColorStop(0.25,'#0a0418'); sky.addColorStop(0.5,'#120620'); sky.addColorStop(0.7,'#1a0825'); sky.addColorStop(1,'#0d0412');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Chuva intensa neon
    ctx.save();
    for (let i=0; i<200; i++) {
      const rx = (d_s(i*53)*W*2 + T*80*(1+d_s(i*53+3)*0.5) + (-camX)*0.3) % (W+100) - 50;
      const ry = (d_s(i*53+1)*H*1.5 + T*180*(1+d_s(i*53+4)*0.3)) % (H+40) - 20;
      const rl = 8 + d_s(i*53+2)*18;
      const rainHue = [280,200,320,180][i%4];
      ctx.globalAlpha = 0.15 + d_s(i*53+5)*0.15;
      ctx.strokeStyle = `hsl(${rainHue},80%,65%)`;
      ctx.lineWidth = 0.5 + d_s(i*53+6)*0.5;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-2, ry+rl); ctx.stroke();
    }
    ctx.restore();

    // Skyline de arranha-céus distantes (parallax lento)
    const offSky = (-camX)*0.02;
    for (let i=0; i<25; i++) {
      const bx = ((d_s(i*37)*3000 + offSky) % 3000) / 3000 * W;
      if (bx < -80 || bx > W+80) continue;
      const bw = 30 + d_s(i*37+1)*50;
      const bh = 120 + d_s(i*37+2)*200;
      const by = H*0.85 - bh;
      // Edifício
      ctx.fillStyle = `rgba(${5+d_s(i*37+3)*10},${3+d_s(i*37+4)*6},${12+d_s(i*37+5)*15},0.9)`;
      ctx.fillRect(bx, by, bw, bh);
      // Janelas neon
      const windowRows = Math.floor(bh/12);
      const windowCols = Math.floor(bw/8);
      for (let wy=0; wy<windowRows; wy++) {
        for (let wx=0; wx<windowCols; wx++) {
          if (d_s(i*37+wy*10+wx) > 0.4) continue;
          const wHue = [280,330,200,50,180][Math.floor(d_s(i*37+wy+wx+6)*5)];
          const flicker = 0.3 + 0.5*d_s(i*37+wy+wx+7) + 0.2*Math.sin(T*2+i+wy*0.5);
          ctx.fillStyle = `hsla(${wHue},90%,60%,${flicker})`;
          ctx.fillRect(bx+3+wx*8, by+3+wy*12, 4, 6);
        }
      }
    }

    // Edifícios médios (parallax 0.06)
    const offMid = (-camX)*0.06;
    for (let i=0; i<15; i++) {
      const bx = ((d_s(i*43)*4000 + offMid) % 4000) / 4000 * W;
      if (bx < -100 || bx > W+100) continue;
      const bw = 50 + d_s(i*43+1)*70;
      const bh = 100 + d_s(i*43+2)*160;
      const by = H*0.85 - bh;
      ctx.fillStyle = `rgba(${8+d_s(i*43+3)*8},${4+d_s(i*43+4)*5},${15+d_s(i*43+5)*12},0.95)`;
      ctx.fillRect(bx, by, bw, bh);
      // Janelas
      const wr = Math.floor(bh/14);
      const wc = Math.floor(bw/10);
      for (let wy=0; wy<wr; wy++) {
        for (let wx=0; wx<wc; wx++) {
          if (d_s(i*43+wy*10+wx+6) > 0.5) continue;
          const wHue = [300,180,50,330][Math.floor(d_s(i*43+wy+wx+8)*4)];
          ctx.fillStyle = `hsla(${wHue},85%,55%,${0.4+0.4*Math.sin(T*1.5+i+wx)})`;
          ctx.fillRect(bx+4+wx*10, by+4+wy*14, 5, 8);
        }
      }
    }

    // POSTERS GIGANTES estilo Blade Runner (holográficos)
    const offPost = (-camX)*0.08;
    for (let i=0; i<6; i++) {
      const px = ((d_s(i*71)*5000 + offPost) % 5000) / 5000 * W;
      if (px < -120 || px > W+120) continue;
      const pw = 80 + d_s(i*71+1)*60;
      const ph8 = 120 + d_s(i*71+2)*80;
      const py = H*0.15 + d_s(i*71+3)*H*0.25;
      // Poster background glow
      const posterHue = [300,180,330,200,50,280][i%6];
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.15*Math.sin(T*0.8+i*2);
      const pg = ctx.createRadialGradient(px+pw/2, py+ph8/2, 0, px+pw/2, py+ph8/2, pw);
      pg.addColorStop(0, `hsla(${posterHue},90%,50%,0.4)`);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(px-20, py-20, pw+40, ph8+40);
      // Poster frame
      ctx.globalAlpha = 0.6 + 0.2*Math.sin(T*1.2+i);
      ctx.fillStyle = `hsla(${posterHue},80%,8%,0.85)`;
      ctx.fillRect(px, py, pw, ph8);
      // Poster content — rosto estilizado (silhueta)
      ctx.fillStyle = `hsla(${posterHue},70%,50%,0.7)`;
      // Oval do rosto
      ctx.beginPath();
      ctx.ellipse(px+pw/2, py+ph8*0.35, pw*0.25, ph8*0.22, 0, 0, Math.PI*2);
      ctx.fill();
      // Olhos brilhantes
      ctx.fillStyle = `hsla(${posterHue},100%,75%,${0.7+0.3*Math.sin(T*3+i)})`;
      ctx.beginPath(); ctx.arc(px+pw*0.38, py+ph8*0.33, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+pw*0.62, py+ph8*0.33, 3, 0, Math.PI*2); ctx.fill();
      // Texto neon — caracteres japoneses fake
      const chars = ['ネ','オ','ン','夜','光','都','市','闇'];
      ctx.fillStyle = `hsla(${posterHue},90%,70%,${0.5+0.3*Math.sin(T*2+i)})`;
      ctx.font = `bold ${8+d_s(i*71+4)*8}px sans-serif`;
      for (let c=0; c<3; c++) {
        const ch = chars[Math.floor(d_s(i*71+5+c)*chars.length)];
        ctx.fillText(ch, px+10+c*pw*0.3, py+ph8*0.75+d_s(i*71+8+c)*15);
      }
      // Scan lines no poster
      ctx.globalAlpha = 0.08;
      for (let sl=0; sl<ph8; sl+=2) {
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(px, py+sl, pw, 1);
      }
      ctx.restore();
    }

    // Carros voadores (flying spinners)
    for (let i=0; i<8; i++) {
      const speed = 30 + d_s(i*61)*60;
      const dir = d_s(i*61+5) > 0.5 ? 1 : -1;
      const cx8 = ((d_s(i*61)*W*3 + T*speed*dir) % (W+200)) - 100;
      const cy8 = H*0.08 + d_s(i*61+1)*H*0.35;
      const carHue = [0,30,200,280,180][i%5];
      // Corpo do carro
      ctx.save();
      ctx.globalAlpha = 0.6 + 0.2*d_s(i*61+2);
      ctx.fillStyle = `hsl(${carHue},70%,15%)`;
      ctx.fillRect(cx8-12, cy8-3, 24, 6);
      ctx.fillStyle = `hsl(${carHue},80%,25%)`;
      ctx.fillRect(cx8-8, cy8-5, 16, 4);
      // Luzes traseiras/dianteiras
      ctx.fillStyle = dir > 0 ? `hsla(0,100%,60%,${0.6+0.4*Math.sin(T*5+i)})` : `hsla(50,100%,70%,${0.6+0.4*Math.sin(T*5+i)})`;
      ctx.beginPath(); ctx.arc(cx8 + dir*14, cy8, 2.5, 0, Math.PI*2); ctx.fill();
      // Trail de luz
      ctx.globalAlpha = 0.15;
      const tg = ctx.createLinearGradient(cx8-dir*60, cy8, cx8-dir*5, cy8);
      tg.addColorStop(0, 'rgba(0,0,0,0)');
      tg.addColorStop(1, `hsla(${dir>0?0:50},100%,50%,0.5)`);
      ctx.fillStyle = tg;
      ctx.fillRect(cx8-dir*60, cy8-1, 55, 2);
      ctx.restore();
    }

    // Neon signs flutuantes
    ctx.save();
    const offNeon = (-camX)*0.1;
    for (let i=0; i<10; i++) {
      const nx = ((d_s(i*83)*6000 + offNeon) % 6000) / 6000 * W;
      if (nx < -60 || nx > W+60) continue;
      const ny = H*0.55 + d_s(i*83+1)*H*0.2;
      const nHue = [300,180,50,330,200,0,280,120,340,30][i];
      const flicker = Math.sin(T*4+i*3) > 0.7 ? 0.2 : 1.0; // Flickering
      ctx.globalAlpha = (0.5 + 0.3*Math.sin(T*1.5+i)) * flicker;
      // Glow
      const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, 30);
      ng.addColorStop(0, `hsla(${nHue},100%,60%,0.5)`);
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(nx, ny, 30, 0, Math.PI*2); ctx.fill();
      // Texto neon
      const signs = ['BAR','HOTEL','24H','OPEN','酒','薬','夢','闇','LIVE','EXIT'];
      ctx.fillStyle = `hsla(${nHue},100%,70%,0.9)`;
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(signs[i], nx, ny+4);
      ctx.textAlign = 'left';
    }
    ctx.restore();

    // Reflexos no chão molhado
    ctx.save();
    ctx.globalAlpha = 0.12 + 0.04*Math.sin(T*0.5);
    const refG = ctx.createLinearGradient(0, H*0.82, 0, H);
    refG.addColorStop(0, 'rgba(0,0,0,0)');
    refG.addColorStop(0.3, 'rgba(180,40,255,0.15)');
    refG.addColorStop(0.6, 'rgba(0,200,255,0.1)');
    refG.addColorStop(1, 'rgba(255,50,100,0.08)');
    ctx.fillStyle = refG;
    ctx.fillRect(0, H*0.82, W, H*0.18);
    ctx.restore();

    // Névoa/smog urbano
    for (let f=0; f<4; f++) {
      const fogY = H*0.65 + f*H*0.05;
      ctx.save();
      ctx.globalAlpha = 0.06 + 0.03*Math.sin(T*0.2+f);
      const fog = ctx.createLinearGradient(0, fogY, 0, fogY+H*0.1);
      fog.addColorStop(0, 'rgba(0,0,0,0)');
      fog.addColorStop(0.5, `rgba(${40+f*10},${10+f*5},${50+f*15},1)`);
      fog.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, fogY, W, H*0.1);
      ctx.restore();
    }

    // Chão de asfalto molhado
    const ground=ctx.createLinearGradient(0,H*0.82,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(8,4,14,0.92)'); ground.addColorStop(1,'rgba(5,2,10,0.96)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.82,W,H*0.18);

    // Scan lines globais (efeito CRT)
    ctx.save();
    ctx.globalAlpha = 0.03;
    for (let sl=0; sl<H; sl+=3) {
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fillRect(0, sl, W, 1);
    }
    ctx.restore();
  }

  // ===============================================================
  //  FASE 9 — Floresta do Terror
  // ===============================================================
  else if (phase === 9) {
    // Céu noturno escuro com raios ocasionais
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#020305'); sky.addColorStop(0.3,'#030608'); sky.addColorStop(0.6,'#050a06'); sky.addColorStop(0.8,'#030804'); sky.addColorStop(1,'#020503');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Relâmpagos aleatórios (flash branco rápido)
    const lightningChance = Math.sin(T*0.7) * Math.sin(T*1.3) * Math.sin(T*2.1);
    if (lightningChance > 0.92) {
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.4 * (lightningChance - 0.92) / 0.08;
      ctx.fillStyle = 'rgba(200,220,255,1)';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      // Silhueta de raio
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = 'rgba(220,240,255,0.9)';
      ctx.lineWidth = 2;
      const lx = W * 0.2 + d_s(Math.floor(T*3)*17) * W * 0.6;
      ctx.beginPath();
      ctx.moveTo(lx, 0);
      let ly = 0;
      for (let seg=0; seg<6; seg++) {
        ly += H*0.15 + d_s(Math.floor(T*3)*17+seg+1)*H*0.05;
        const dx = (d_s(Math.floor(T*3)*17+seg+7)-0.5)*60;
        ctx.lineTo(lx+dx, ly);
      }
      ctx.stroke();
      // Glow
      ctx.lineWidth = 8;
      ctx.globalAlpha = 0.15;
      ctx.stroke();
      ctx.restore();
    }

    // Árvores silhueta — camada distante (parallax 0.03)
    const offTree1 = (-camX)*0.03;
    for (let i=0; i<20; i++) {
      const tx = ((d_s(i*47)*3000 + offTree1) % 3000) / 3000 * W;
      if (tx < -80 || tx > W+80) continue;
      const th = 180 + d_s(i*47+1)*150;
      const tw = 30 + d_s(i*47+2)*40;
      const ty = H*0.85 - th;
      ctx.fillStyle = `rgba(2,4,3,0.95)`;
      // Tronco
      ctx.fillRect(tx+tw*0.35, ty+th*0.4, tw*0.3, th*0.6);
      // Copa triangular
      ctx.beginPath();
      ctx.moveTo(tx+tw/2, ty);
      ctx.lineTo(tx-tw*0.1, ty+th*0.5);
      ctx.lineTo(tx+tw*1.1, ty+th*0.5);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(tx+tw/2, ty+th*0.15);
      ctx.lineTo(tx-tw*0.2, ty+th*0.65);
      ctx.lineTo(tx+tw*1.2, ty+th*0.65);
      ctx.closePath();
      ctx.fill();
    }

    // Árvores médias (parallax 0.07)
    const offTree2 = (-camX)*0.07;
    for (let i=0; i<15; i++) {
      const tx = ((d_s(i*59)*4000 + offTree2) % 4000) / 4000 * W;
      if (tx < -100 || tx > W+100) continue;
      const th = 200 + d_s(i*59+1)*180;
      const tw = 40 + d_s(i*59+2)*50;
      const ty = H*0.85 - th;
      ctx.fillStyle = `rgba(3,6,4,0.97)`;
      // Tronco retorcido
      ctx.fillRect(tx+tw*0.3, ty+th*0.35, tw*0.4, th*0.65);
      // Galhos
      ctx.save();
      ctx.strokeStyle = 'rgba(3,6,4,0.95)';
      ctx.lineWidth = 3 + d_s(i*59+3)*3;
      for (let b=0; b<3; b++) {
        const bx = tx+tw*0.5;
        const by2 = ty+th*(0.3+b*0.15);
        const dir = d_s(i*59+4+b) > 0.5 ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(bx, by2);
        ctx.quadraticCurveTo(bx+dir*(30+d_s(i*59+7+b)*30), by2-20, bx+dir*(50+d_s(i*59+10+b)*40), by2-10-d_s(i*59+13+b)*30);
        ctx.stroke();
      }
      ctx.restore();
      // Copa densa e irregular
      ctx.beginPath();
      ctx.moveTo(tx+tw/2, ty);
      ctx.lineTo(tx-tw*0.3, ty+th*0.45);
      ctx.lineTo(tx+tw*1.3, ty+th*0.45);
      ctx.closePath();
      ctx.fill();
    }

    // Olhos vermelhos brilhando na escuridão (pares de pontos)
    for (let i=0; i<8; i++) {
      const ex = ((d_s(i*73)*5000 + (-camX)*0.05) % 5000) / 5000 * W;
      if (ex < -20 || ex > W+20) continue;
      const ey = H*0.3 + d_s(i*73+1)*H*0.4;
      const blinkCycle = Math.sin(T*0.8+i*2.5);
      if (blinkCycle < -0.3) continue; // Piscando
      const eyeAlpha = 0.4 + 0.4*blinkCycle;
      ctx.save();
      ctx.globalAlpha = eyeAlpha;
      ctx.fillStyle = `hsl(${d_s(i*73+2) > 0.7 ? 60 : 0},100%,50%)`;
      ctx.beginPath(); ctx.arc(ex-4, ey, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+4, ey, 2, 0, Math.PI*2); ctx.fill();
      // Glow
      ctx.globalAlpha = eyeAlpha * 0.3;
      const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, 15);
      eg.addColorStop(0, `hsla(${d_s(i*73+2) > 0.7 ? 60 : 0},100%,50%,0.4)`);
      eg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(ex, ey, 15, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Névoa rasteira verde-escura
    for (let f=0; f<5; f++) {
      const fogY = H*0.70 + f*H*0.04;
      ctx.save();
      ctx.globalAlpha = 0.06 + 0.04*Math.sin(T*0.15+f*1.5);
      const fog = ctx.createLinearGradient(0, fogY, 0, fogY+H*0.08);
      fog.addColorStop(0, 'rgba(0,0,0,0)');
      fog.addColorStop(0.5, `rgba(${10+f*5},${30+f*8},${10+f*3},1)`);
      fog.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, fogY, W, H*0.08);
      ctx.restore();
    }

    // Vaga-lumes ambientais (não o jogador)
    for (let i=0; i<12; i++) {
      const fx = ((d_s(i*91)*4000 + T*8*(d_s(i*91+5)-0.5) + (-camX)*0.08) % (W+100)) - 50;
      const fy = H*0.2 + d_s(i*91+1)*H*0.55 + Math.sin(T*0.5+i*3)*15;
      const fAlpha = 0.2 + 0.5 * Math.max(0, Math.sin(T*1.5+i*4));
      ctx.save();
      ctx.globalAlpha = fAlpha;
      const fg2 = ctx.createRadialGradient(fx, fy, 0, fx, fy, 8);
      fg2.addColorStop(0, 'rgba(120,220,40,0.8)');
      fg2.addColorStop(0.5, 'rgba(80,180,20,0.3)');
      fg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg2;
      ctx.beginPath(); ctx.arc(fx, fy, 8, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Chuva fina e escura
    ctx.save();
    for (let i=0; i<80; i++) {
      const rx = (d_s(i*67)*W*2 + T*60*(1+d_s(i*67+3)*0.3) + (-camX)*0.2) % (W+60) - 30;
      const ry = (d_s(i*67+1)*H*1.5 + T*150*(1+d_s(i*67+4)*0.2)) % (H+30) - 15;
      const rl = 6 + d_s(i*67+2)*12;
      ctx.globalAlpha = 0.08 + d_s(i*67+5)*0.08;
      ctx.strokeStyle = 'rgba(100,120,100,0.7)';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-1, ry+rl); ctx.stroke();
    }
    ctx.restore();

    // Chão de terra/musgo
    const ground=ctx.createLinearGradient(0,H*0.82,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(8,14,6,0.94)'); ground.addColorStop(1,'rgba(4,8,3,0.97)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.82,W,H*0.18);
  }

  // ===============================================================
  //  FASE 10 — Jardim Celestial — O Reencontro
  // ===============================================================
  else if (phase === 10) {
    // Céu crepuscular dourado/roxo — amanhecer mágico
    const sky=ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#0a0520'); sky.addColorStop(0.2,'#1a0a35'); sky.addColorStop(0.4,'#2d1248');
    sky.addColorStop(0.6,'#4a1a3a'); sky.addColorStop(0.75,'#6b2828'); sky.addColorStop(0.9,'#8a4018'); sky.addColorStop(1,'#2a1508');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // Estrelas brilhantes com tons dourados
    for (let i=0; i<120; i++) {
      const sx=d_s(i*37)*W, sy=d_s(i*37+1)*H*0.5;
      const sa=0.3+0.5*d_s(i*37+2)+0.25*Math.sin(T*1.2+i*0.9);
      const starHue = [40,30,50,20,60][i%5];
      const starSize = d_s(i*37+3)*1.5+0.3;
      ctx.globalAlpha=sa;
      ctx.fillStyle=`hsl(${starHue},${80+d_s(i*37+4)*20}%,${80+d_s(i*37+5)*15}%)`;
      ctx.beginPath(); ctx.arc(sx,sy,starSize,0,Math.PI*2); ctx.fill();
      if (starSize > 1.2) {
        ctx.globalAlpha = sa * 0.4;
        ctx.fillRect(sx-5, sy-0.3, 10, 0.6);
        ctx.fillRect(sx-0.3, sy-5, 0.6, 10);
      }
    }
    ctx.globalAlpha=1;

    // Sol nascente no horizonte
    const sunX = W*0.5 + (-camX)*0.003;
    const sunY = H*0.72;
    ctx.save(); ctx.globalCompositeOperation='screen';
    for (let h=0; h<4; h++) {
      const sg = ctx.createRadialGradient(sunX, sunY, 5+h*8, sunX, sunY, 80+h*60);
      sg.addColorStop(0, `rgba(255,200,80,${0.15-h*0.03})`);
      sg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(sunX, sunY, 80+h*60, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle='#ffe8a0'; ctx.beginPath(); ctx.arc(sunX, sunY, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,220,140,0.6)'; ctx.beginPath(); ctx.arc(sunX, sunY, 25, 0, Math.PI*2); ctx.fill();

    // Montanhas douradas distantes
    const off1=(-camX)*0.015;
    mtn(off1, H*0.52, 0.00012, 0, '#1a0a1e', 0.85);
    mtn(off1*1.5, H*0.58, 0.00015, 0, '#22102a', 0.80);

    // Árvores mágicas com folhas brilhantes (parallax 0.04)
    const offTree1 = (-camX)*0.04;
    for (let i=0; i<20; i++) {
      const tx = ((d_s(i*47)*6000 + offTree1) % 6000) / 6000 * W;
      if (tx < -80 || tx > W+80) continue;
      const th = 120 + d_s(i*47+1)*100;
      const tw = 25 + d_s(i*47+2)*30;
      const ty = H*0.85 - th;
      // Tronco
      ctx.fillStyle = `rgba(40,20,15,0.9)`;
      ctx.fillRect(tx+tw*0.35, ty+th*0.35, tw*0.3, th*0.65);
      // Copa brilhante
      const leafHue = [40,50,30,45,55][i%5];
      ctx.fillStyle = `hsla(${leafHue},70%,25%,0.85)`;
      ctx.beginPath(); ctx.arc(tx+tw/2, ty+th*0.25, tw*0.7, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(tx+tw/2-tw*0.3, ty+th*0.35, tw*0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(tx+tw/2+tw*0.3, ty+th*0.35, tw*0.5, 0, Math.PI*2); ctx.fill();
      // Brilho na copa
      ctx.save();
      ctx.globalAlpha = 0.15 + 0.1*Math.sin(T*0.5+i*1.5);
      ctx.globalCompositeOperation = 'screen';
      const lg = ctx.createRadialGradient(tx+tw/2, ty+th*0.25, 0, tx+tw/2, ty+th*0.25, tw);
      lg.addColorStop(0, `hsla(${leafHue},80%,60%,0.5)`);
      lg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.arc(tx+tw/2, ty+th*0.25, tw, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Flores flutuantes (pétalas caindo)
    for (let i=0; i<30; i++) {
      const px2 = ((d_s(i*83)*W*2 + T*12*(0.5+d_s(i*83+1)*0.5) + (-camX)*0.1) % (W+100)) - 50;
      const py2 = (d_s(i*83+2)*H + T*15*(0.3+d_s(i*83+3)*0.4)) % (H+20) - 10;
      const petalHue = [340,350,320,30,50][i%5];
      const petalA = 0.3 + 0.3*Math.sin(T*0.8+i*2);
      const ps = 2 + d_s(i*83+4)*3;
      ctx.save();
      ctx.globalAlpha = petalA;
      ctx.translate(px2, py2);
      ctx.rotate(T*0.5+i*1.3);
      ctx.fillStyle = `hsla(${petalHue},70%,70%,0.8)`;
      ctx.beginPath(); ctx.ellipse(0, 0, ps, ps*0.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Vaga-lumes dourados (muitos!)
    for (let i=0; i<25; i++) {
      const fx = ((d_s(i*97)*5000 + T*10*(d_s(i*97+5)-0.5) + (-camX)*0.08) % (W+150)) - 75;
      const fy = H*0.15 + d_s(i*97+1)*H*0.55 + Math.sin(T*0.6+i*3.5)*18;
      const fAlpha = 0.3 + 0.6 * Math.max(0, Math.sin(T*1.8+i*4.2));
      ctx.save();
      ctx.globalAlpha = fAlpha;
      const fg2 = ctx.createRadialGradient(fx, fy, 0, fx, fy, 10);
      fg2.addColorStop(0, 'rgba(255,220,80,0.9)');
      fg2.addColorStop(0.5, 'rgba(255,180,40,0.3)');
      fg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fg2;
      ctx.beginPath(); ctx.arc(fx, fy, 10, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Névoa dourada rasteira
    for (let f=0; f<4; f++) {
      const fogY = H*0.70 + f*H*0.04;
      ctx.save();
      ctx.globalAlpha = 0.06 + 0.04*Math.sin(T*0.2+f*1.5);
      const fog = ctx.createLinearGradient(0, fogY, 0, fogY+H*0.08);
      fog.addColorStop(0, 'rgba(0,0,0,0)');
      fog.addColorStop(0.5, `rgba(${60+f*10},${35+f*8},${10+f*3},1)`);
      fog.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, fogY, W, H*0.08);
      ctx.restore();
    }

    // Chão de terra com flores
    const ground=ctx.createLinearGradient(0,H*0.82,0,H);
    ground.addColorStop(0,'rgba(0,0,0,0)'); ground.addColorStop(0.3,'rgba(25,12,8,0.92)'); ground.addColorStop(1,'rgba(15,8,4,0.96)');
    ctx.fillStyle=ground; ctx.fillRect(0,H*0.82,W,H*0.18);
  }

  const vign = ctx.createRadialGradient(W/2,H/2,H*0.32,W/2,H/2,H*0.78);
  vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.52)');
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);

  // -- Poeira atmosferica (todas as fases) --
  const dustCol = [[0,180,200],[0,160,220],[120,60,200],[180,210,255],[230,55,15],[120,40,180],[180,20,30],[180,40,255],[30,120,20],[255,200,60]][Math.min(phase-1,9)];
  const [dr,dg,db]=dustCol;
  for (const d of bgDust) {
    const sx = d.x - camX*0.7;
    if (sx<-5||sx>W+5) continue;
    ctx.save(); ctx.globalAlpha=d.alpha*1.4;
    ctx.fillStyle=`rgb(${dr},${dg},${db})`;
    ctx.beginPath(); ctx.arc(sx,d.y,d.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// helper: pseudo-random determinístico para efeitos de fundo
function d_s(n) {
  let s = (n*2654435761)>>>0; s ^= s>>>16; s = Math.imul(s,0x45d9f3b)>>>0; s ^= s>>>16;
  return (s>>>0)/4294967295;
}

function drawPlatforms() {
  // Paletas de pedra natural por fase
  const STONE = [
