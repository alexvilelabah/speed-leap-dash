name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, e.g., 4)'
        required: true
        default: '4'
      version_name:
        description: 'Version name (e.g., 2.0.0)'
        required: true
        default: '2.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync

      - name: Update version code and name
        run: |
          VERSION_CODE=${{ github.event.inputs.version_code }}
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/g" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/glowjump-upload.keystore

      - name: Configure signing in build.gradle
        run: |
          # Insert signingConfigs block inside the android {} block
          sed -i '/android {/a\
              signingConfigs {\
                  release {\
                      storeFile file("../glowjump-upload.keystore")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' android/app/build.gradle

          # Update release buildType to use signing config and enable minification
          sed -i 's/minifyEnabled false/minifyEnabled true/' android/app/build.gradle
          sed -i '/minifyEnabled true/a\
                      signingConfig signingConfigs.release' android/app/build.gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          release_name: Release v${{ github.event.inputs.version_name }}
          body: |
            Android App Bundle ready for Play Store upload.

            Version Code: ${{ github.event.inputs.version_code }}
            Version Name: ${{ github.event.inputs.version_name }}
            Download: app-release.aab from artifacts
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./android/app/build/outputs/bundle/release/app-release.aab
          asset_name: app-release-v${{ github.event.inputs.version_name }}.aab
          asset_content_type: application/octet-stream
